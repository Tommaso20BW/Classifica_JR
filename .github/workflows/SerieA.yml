name: Aggiorna Classifica Live - Serie A
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'                      # cache dei pacchetti pip

      - name: Installa Dipendenze
        run: pip install -r requirements.txt

      - name: Cache browser Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Installa Browser Playwright (solo se non in cache)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Installa dipendenze di sistema (browser gia' in cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Esegui Script Classifica
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          COMPETITION: SA
        run: python aggiorna_classifica.py

      - name: Invia Screenshot su Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMPETITION: SA
        run: python screenshot_telegram.py

      - name: Commit e Push del JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add classifica.json
          git diff --quiet && git diff --staged --quiet || (git commit -m 'Classifica aggiornata automaticamente (SA)' && git push)
