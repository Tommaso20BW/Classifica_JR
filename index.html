<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <title>Classifica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:  900px;
      height: 1200px;
      overflow: hidden;
    }

    body {
      --c-bg-a:      #0a1a6e;
      --c-bg-b:      #061050;
      --c-bg-base:   #04093a;
      --c-header-hi: #4a9fff;
      --c-row-odd:   rgba(255,255,255,0.06);
      --c-row-even:  rgba(255,255,255,0.00);
      --c-row-border:rgba(255,255,255,0.08);
      --c-text:      #ffffff;
      --c-text-dim:  #7a8ecc;
      --c-pts:       #5aabff;
      --c-zone-ucl:  #1a6bdc;
      --c-zone-uel:  #e87010;
      --c-zone-uecl: #22a855;
      --c-zone-rel:  #dc2020;
      --c-juve:      #d4af37;
      --row-h: 93px;
      --head-h: 170px;
      --leg-h: 52px;
    }

    /* ══ SERIE A tema (default) ══ */
    body.comp-SA {
      --c-texture: url("data:image/svg+xml,%3Csvg width='900' height='1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='g1' cx='15%25' cy='10%25' r='55%25'%3E%3Cstop offset='0' stop-color='%231a3fc4' stop-opacity='.55'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3CradialGradient id='g2' cx='85%25' cy='90%25' r='55%25'%3E%3Cstop offset='0' stop-color='%230d2090' stop-opacity='.45'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1200' fill='%23040930'/%3E%3Crect width='900' height='1200' fill='url(%23g1)'/%3E%3Crect width='900' height='1200' fill='url(%23g2)'/%3E%3Ccircle cx='450' cy='600' r='380' fill='none' stroke='%231a3fc4' stroke-width='1' stroke-opacity='.08'/%3E%3Ccircle cx='450' cy='600' r='280' fill='none' stroke='%231a3fc4' stroke-width='1' stroke-opacity='.06'/%3E%3Ccircle cx='450' cy='600' r='180' fill='none' stroke='%231a3fc4' stroke-width='1' stroke-opacity='.04'/%3E%3Cline x1='0' y1='0' x2='900' y2='1200' stroke='%231a3fc4' stroke-width='.5' stroke-opacity='.05'/%3E%3Cline x1='900' y1='0' x2='0' y2='1200' stroke='%231a3fc4' stroke-width='.5' stroke-opacity='.05'/%3E%3C/svg%3E");
    }

    /* ══ UCL tema ══ */
    body.comp-UCL {
      --c-bg-a:      #0a0a1a;
      --c-bg-b:      #050510;
      --c-bg-base:   #020208;
      --c-header-hi: #4a9fff;
      --c-row-odd:   rgba(255,255,255,0.05);
      --c-row-even:  rgba(255,255,255,0.00);
      --c-row-border:rgba(255,255,255,0.07);
      --c-text-dim:  #6080a0;
      --c-pts:       #ffffff;
      --c-zone-top:  #1db954; /* verde R16 diretto */
      --c-zone-mid:  #f5a623; /* giallo/arancio playoff */
      --c-zone-bot:  #e02020; /* rosso eliminati */
      --row-h: 49px;
      --head-h: 130px;
      --leg-h: 58px;
      --c-texture: url("data:image/svg+xml,%3Csvg width='900' height='1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='ga' cx='50%25' cy='0%25' r='60%25'%3E%3Cstop offset='0' stop-color='%230a1540' stop-opacity='.9'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1200' fill='%23050510'/%3E%3Crect width='900' height='1200' fill='url(%23ga)'/%3E%3C/svg%3E");
    }

    /* ══ UEL tema ══ */
    body.comp-UEL {
      --c-bg-a:      #1a0800;
      --c-bg-b:      #0f0500;
      --c-bg-base:   #080300;
      --c-header-hi: #ff6a00;
      --c-row-odd:   rgba(255,255,255,0.05);
      --c-row-even:  rgba(255,255,255,0.00);
      --c-row-border:rgba(255,255,255,0.07);
      --c-text-dim:  #9a6040;
      --c-pts:       #ffffff;
      --c-zone-top:  #1db954;
      --c-zone-mid:  #f5a623;
      --c-zone-bot:  #e02020;
      --row-h: 49px;
      --head-h: 130px;
      --leg-h: 58px;
      --c-texture: url("data:image/svg+xml,%3Csvg width='900' height='1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='ga' cx='50%25' cy='0%25' r='70%25'%3E%3Cstop offset='0' stop-color='%23301000' stop-opacity='.8'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1200' fill='%230a0400'/%3E%3Crect width='900' height='1200' fill='url(%23ga)'/%3E%3C/svg%3E");
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--c-text, #fff);
      background-image: var(--c-texture);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      height: var(--head-h);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px 14px;
    }

    /* Header SA */
    .header-logo-sa {
      display: none;
    }
    body.comp-SA .header-logo-sa { display: block; }

    /* Header UCL/UEL: logo + titolo affiancati */
    .header-ucl-row {
      display: none;
      align-items: center;
      gap: 18px;
      margin-bottom: 6px;
    }
    body.comp-UCL .header-ucl-row,
    body.comp-UEL .header-ucl-row { display: flex; }

    .header-ucl-emblem {
      width: 60px;
      height: 60px;
      object-fit: contain;
      opacity: 0.95;
    }

    .header-title {
      font-family: 'Anton', sans-serif;
      font-size: 5.8rem;
      letter-spacing: 0.10em;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
      text-align: center;
      white-space: nowrap;
    }
    .header-title.long { font-size: 3.4rem; }

    .header-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--c-header-hi);
      margin-top: 4px;
      text-align: center;
    }
    .header-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin-top: 12px;
    }

    /* ── TABLE AREA ── */
    .table-area {
      flex: 1;
      display: flex;
      padding: 10px 18px 0;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── COL HEADER ── */
    .col-head {
      display: grid;
      grid-template-columns: 30px 40px 1fr 44px 40px;
      align-items: center;
      padding: 4px 8px 6px;
      margin-bottom: 4px;
      color: var(--c-text-dim);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .col-head div { text-align: center; }
    .col-head div:nth-child(3) { text-align: left; padding-left: 4px; }

    .col-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    /* ── ROW ── */
    .row {
      position: relative;
      display: grid;
      grid-template-columns: 30px 40px 1fr 44px 40px;
      align-items: center;
      border-radius: 4px;
      padding: 0 8px;
      border: 1px solid var(--c-row-border);
      flex: 1;
      min-height: 0;
    }
    .row:nth-child(odd)  { background: var(--c-row-odd); }
    .row:nth-child(even) { background: var(--c-row-even); }

    /* Barra sinistra zona */
    .row::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--zone, transparent);
    }

    /* Separatore orizzontale tra zone */
    .row.zone-sep {
      border-top: 1px solid rgba(255,255,255,0.15);
      margin-top: 2px;
    }

    /* ── CELLE ── */
    .c-pos {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--c-text-dim);
      text-align: center;
    }
    .c-logo {
      display: flex; align-items: center; justify-content: center;
    }
    .c-logo img { width: 28px; height: 28px; object-fit: contain; }
    .c-name {
      font-size: 1rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #eef2ff;
      padding-left: 6px;
    }
    .c-pt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 900;
      color: var(--c-pts);
      text-align: center;
    }
    .c-dr {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      text-align: center;
    }
    .c-dr.pos { color: #4ade80; }
    .c-dr.neg { color: #f87171; }
    .c-dr.zer { color: var(--c-text-dim); }

    /* SA-specific: righe grandi */
    body.comp-SA .c-logo img { width: 34px; height: 34px; }
    body.comp-SA .c-pt    { font-size: 1.5rem; }
    body.comp-SA .c-name  { font-size: 1rem; }
    body.comp-SA .c-pos   { font-size: 1.3rem; }

    /* UCL/UEL: righe compatte */
    body.comp-UCL .c-logo img,
    body.comp-UEL .c-logo img { width: 26px; height: 26px; }
    body.comp-UCL .c-name,
    body.comp-UEL .c-name  { font-size: .82rem; }
    body.comp-UCL .c-pt,
    body.comp-UEL .c-pt    { font-size: 1.2rem; }
    body.comp-UCL .c-dr,
    body.comp-UEL .c-dr    { font-size: 1rem; }
    body.comp-UCL .c-pos,
    body.comp-UEL .c-pos   { font-size: 1.1rem; }
    body.comp-UCL .col-head,
    body.comp-UEL .col-head { font-size: .7rem; }

    /* UCL/UEL: punti evidenziati nella stessa colonna con badge colorato */
    body.comp-UCL .c-pt,
    body.comp-UEL .c-pt {
      font-size: 1.1rem;
      font-weight: 900;
      color: #ffffff;
    }

    /* Badge punti per UCL/UEL (zona top: verde, zona mid: arancio, zona bot: rosso) */
    body.comp-UCL .row[data-zone="top"] .c-pt,
    body.comp-UEL .row[data-zone="top"] .c-pt {
      color: #1db954;
    }
    body.comp-UCL .row[data-zone="mid"] .c-pt,
    body.comp-UEL .row[data-zone="mid"] .c-pt {
      color: #f5a623;
    }
    body.comp-UCL .row[data-zone="bot"] .c-pt,
    body.comp-UEL .row[data-zone="bot"] .c-pt {
      color: #e87070;
    }

    .row.juve { border-color: var(--c-juve) !important; }

    /* ── LEGEND ── */
    .legend {
      height: var(--leg-h);
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 8px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .95rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--c-text-dim);
    }
    .legend-dot {
      width: 13px; height: 13px; border-radius: 3px;
      flex-shrink: 0;
    }

    /* Linea separatrice tra zone UCL/UEL */
    body.comp-UCL .col-rows .zone-divider,
    body.comp-UEL .col-rows .zone-divider {
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 1px;
      flex-shrink: 0;
      margin: 1px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-ucl-row">

  <div class="table-area" id="tableArea"></div>

function italianizzaNome(name) {
  if (!name) return name;
  return MAPPA_NOMI[name.toLowerCase().trim()] || name;
}

/* Emblemi SVG inline per UCL/UEL quando non disponibili */
const UCL_EMBLEM = `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
  <circle cx="30" cy="30" r="28" fill="none" stroke="#4a9fff" stroke-width="1.5" opacity=".6"/>
  <text x="30" y="36" text-anchor="middle" font-family="Anton,sans-serif" font-size="11" fill="#4a9fff" letter-spacing="1">UCL</text>
</svg>`;

const UEL_EMBLEM = `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
  <circle cx="30" cy="30" r="28" fill="none" stroke="#ff6a00" stroke-width="1.5" opacity=".6"/>
  <text x="30" y="36" text-anchor="middle" font-family="Anton,sans-serif" font-size="11" fill="#ff6a00" letter-spacing="1">UEL</text>
</svg>`;

const COMP_CONFIG = {
  SA: {
    titolo: "Serie A", longTitle: false,
    cols: 2, perCol: 10,
    mode: "sa",
    zone: p => {
      if (p <= 4)  return { color: "var(--c-zone-ucl)", key: "top" };
      if (p <= 6)  return { color: "var(--c-zone-uel)", key: "mid" };
      if (p === 7) return { color: "var(--c-zone-uecl)", key: "uecl" };
      if (p >= 18) return { color: "var(--c-zone-rel)", key: "bot" };
      return { color: "transparent", key: "" };
    },
    sepAfter: [4, 6, 7, 17],
    legend: [
      { color:"var(--c-zone-ucl)",  label:"Champions League" },
      { color:"var(--c-zone-uel)",  label:"Europa League" },
      { color:"var(--c-zone-uecl)", label:"Conference League" },
      { color:"var(--c-zone-rel)",  label:"Retrocesse" },
    ]
  },
  UCL: {
    titolo: "Champions League", longTitle: true,
    cols: 2, perCol: 18,
    mode: "ucl",
    emblem: UCL_EMBLEM,
    giornataLabel: "AFTER MD",
    zone: p => {
      if (p <= 8)  return { color: "var(--c-zone-top)", key: "top" };

      return { color: "var(--c-zone-bot)", key: "bot" };
    },
    sepAfter: [8, 24],
    legend: [
      { color:"#1db954", label:"R16 diretti" },
      { color:"#f5a623", label:"Playoff" },
      { color:"#e02020", label:"Eliminati" },
    ]
  },
  UEL: {
    titolo: "Europa League", longTitle: true,
    cols: 2, perCol: 18,
    mode: "uel",
    emblem: UEL_EMBLEM,
    giornataLabel: "AFTER MD",
    zone: p => {
      if (p <= 8)  return { color: "var(--c-zone-top)", key: "top" };
      if (p <= 24) return { color: "var(--c-zone-mid)", key: "mid" };
      return { color: "var(--c-zone-bot)", key: "bot" };
    },
    sepAfter: [8, 24],
    legend: [
      { color:"#1db954", label:"R16 diretti" },
      { color:"#f5a623", label:"Playoff" },
      { color:"#e02020", label:"Eliminati" },
    ]
  }
};

function drClass(dr) { return dr > 0 ? 'pos' : dr < 0 ? 'neg' : 'zer'; }
function drVal(dr)   { return dr > 0 ? '+'+dr : ''+dr; }

function buildRow(t, zoneInfo, cfg) {
  const name = italianizzaNome(t.team);
  const isJuve = name.toLowerCase().includes('juv');
  const logo = t.logo ? `<img src="${t.logo}" alt="">` : '';
  return `<div class="row${isJuve?' juve':''}" style="--zone:${zoneInfo.color}" data-zone="${zoneInfo.key}">
    <div class="c-pos">${t.pos}</div>
    <div class="c-logo">${logo}</div>
    <div class="c-name">${name}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drClass(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}

function buildColHead() {
  return `<div class="col-head">
    <div></div><div></div><div>Squadra</div><div>Pt</div><div>GD</div>
  </div>`;
}

(window.__CLASSIFICA__ ? Promise.resolve(window.__CLASSIFICA__) : fetch('./classifica.json').then(r=>r.json()))
  .then(data => {
    const key = (data.competition || 'SA').toUpperCase();
    const cfg = COMP_CONFIG[key] || COMP_CONFIG.SA;

    document.body.classList.add('comp-' + key);

    /* ── Header ── */
    if (cfg.mode === 'sa') {
      document.getElementById('heroTitleSA').style.display = '';
      document.getElementById('heroTitleSA').textContent = cfg.titolo;
      document.getElementById('heroSubSA').style.display = '';
      document.getElementById('heroSubSA').textContent = `Classifica · Giornata ${data.giornata || '—'} · 2025/26`;
      document.querySelector('.header-ucl-row').style.display = 'none';
    } else {
      document.getElementById('heroTitleSA').style.display = 'none';
      document.getElementById('heroSubSA').style.display = 'none';

      const heroTitle = document.getElementById('heroTitle');
      heroTitle.textContent = cfg.titolo;

      /* Emblem */
      const emblemEl = document.getElementById('headerEmblem');
      if (t => emblemEl) {
        const blob = new Blob([cfg.emblem], {type:'image/svg+xml'});
        emblemEl.src = URL.createObjectURL(blob);
      }

      document.getElementById('heroSub').textContent =
        `${cfg.giornataLabel || 'Giornata'} ${data.giornata || '—'} · 2025/26`;
    }

    /* ── Costruzione tabella ── */
    const area = document.getElementById('tableArea');
    let html = '';

    for (let i = 0; i < cfg.cols; i++) {
      const slice = data.classifica.slice(i * cfg.perCol, (i+1) * cfg.perCol);
      if (!slice.length) continue;

      let rowsHtml = '';
      slice.forEach((t, idx) => {
        const posGlobal = i * cfg.perCol + idx + 1;
        const zoneInfo = cfg.zone(posGlobal);
        rowsHtml += buildRow(t, zoneInfo, cfg);

        /* Separatore tra zone */
        if (cfg.sepAfter && cfg.sepAfter.includes(posGlobal)) {
          const nextPos = posGlobal + 1;
          if (nextPos <= cfg.perCol * cfg.cols) {
            rowsHtml += `<div class="zone-divider"></div>`;
          }
        }
      });

      html += `<div class="col">
        ${buildColHead()}
        <div class="col-rows">${rowsHtml}</div>
      </div>`;
    }
    area.innerHTML = html;

    /* ── Legenda ── */
    document.getElementById('legend').innerHTML = cfg.legend.map(l =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${l.color}"></div>${l.label}
      </div>`
    ).join('');
  });
</script>
</body>
</html>
