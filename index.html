<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<title>Classifica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Saira:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:900px;height:1200px;overflow:hidden;}

  body{
    color:var(--ink);display:flex;flex-direction:column;position:relative;
    font-family:'Saira',sans-serif;
    --f-display:'Saira'; --f-body:'Saira'; --f-num:'Saira';
  }

  /* ════ SERIE A — blu ════ */
  body.comp-SA{
    background:linear-gradient(165deg,#2f78ff 0%,#1240cc 58%,#0c2ea6 100%);
    --f-display:'Archivo'; --f-body:'Archivo'; --f-num:'Archivo';
    --ink:#ffffff; --ink-dim:rgba(255,255,255,.66);
    --row-odd:rgba(255,255,255,.08); --line:rgba(255,255,255,.16); --scrim:rgba(0,0,0,.16);
    --chip-bg:rgba(255,255,255,.18); --chip-fg:#fff;
    --dr-pos:#a8ffca; --dr-neg:#ffbcbc;
    --z1:#34e3ff; --z2:#ff9540; --z3:#36d870; --z4:#ff5d5d;
    --hi-soft:rgba(255,255,255,.20);
    --head-h:172px; --leg-h:60px;
  }
  /* ════ CHAMPIONS LEAGUE — navy ════ */
  body.comp-UCL{
    background:linear-gradient(165deg,#1c40b0 0%,#0e2068 58%,#0a1550 100%);
    --ink:#ffffff; --ink-dim:rgba(255,255,255,.64);
    --row-odd:rgba(255,255,255,.07); --line:rgba(255,255,255,.14); --scrim:rgba(0,0,0,.20);
    --chip-bg:rgba(255,255,255,.16); --chip-fg:#fff;
    --dr-pos:#9dffbf; --dr-neg:#ffb4b4;
    --z1:#2bd46f; --z2:#ffc94f; --z3:#ff6e6e;
    --hi-soft:rgba(255,255,255,.18);
    --head-h:164px; --leg-h:58px;
  }
  /* ════ EUROPA LEAGUE — arancione ════ */
  body.comp-UEL{
    background:linear-gradient(165deg,#ff941f 0%,#f56600 58%,#e35700 100%);
    --f-display:'Oswald'; --f-body:'Oswald'; --f-num:'Oswald';
    --ink:#241200; --ink-dim:rgba(36,18,0,.62);
    --row-odd:rgba(0,0,0,.055); --line:rgba(0,0,0,.16); --scrim:rgba(0,0,0,.10);
    --chip-bg:rgba(0,0,0,.14); --chip-fg:rgba(0,0,0,.72);
    --dr-pos:#0c5a2a; --dr-neg:#8a1414;
    --z1:#07c95f; --z2:#fff14d; --z3:#e21515;
    --hi-soft:rgba(0,0,0,.15);
    --head-h:164px; --leg-h:58px;
  }
  /* ════ CONFERENCE LEAGUE — verde ════ */
  body.comp-UECL{
    background:linear-gradient(165deg,#27cc6c 0%,#129b4f 58%,#0c8645 100%);
    --f-display:'Fredoka'; --f-body:'Nunito'; --f-num:'Fredoka';
    --ink:#06220f; --ink-dim:rgba(6,34,15,.60);
    --row-odd:rgba(0,0,0,.06); --line:rgba(0,0,0,.13); --scrim:rgba(0,0,0,.10);
    --chip-bg:rgba(0,0,0,.14); --chip-fg:rgba(0,0,0,.70);
    --dr-pos:#06220f; --dr-neg:#7a1414;
    --z1:#063; --z2:#ffd24f; --z3:#e21515;
    --hi-soft:rgba(0,0,0,.15);
    --head-h:164px; --leg-h:58px;
  }
  /* sovrascrivo z1 UECL con un verde scuro che stacca dal fondo */
  body.comp-UECL{ --z1:#06351c; }

  /* ──────── HEADER ──────── */
  .header{
    height:var(--head-h);flex-shrink:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:0 44px;text-align:center;
  }
  .header-title{font-family:var(--f-display),sans-serif;line-height:.96;white-space:nowrap;color:var(--ink);}
  body.comp-SA   .header-title{font-weight:900;font-size:4.7rem;letter-spacing:.01em;}
  body.comp-UCL  .header-title{font-weight:700;font-size:3.4rem;letter-spacing:.1em;text-transform:uppercase;}
  body.comp-UEL  .header-title{font-weight:700;font-size:3.7rem;letter-spacing:.015em;text-transform:uppercase;}
  body.comp-UECL .header-title{font-weight:600;font-size:3.4rem;letter-spacing:0;text-transform:uppercase;}

  .header-sub{
    font-family:'Barlow Semi Condensed',sans-serif;
    font-size:.95rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;
    color:var(--ink-dim);margin-top:15px;padding-left:.3em;
  }
  body.comp-UECL .header-sub{font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:.2em;}

  .header-rule{margin-top:15px;width:58px;height:3px;border-radius:2px;background:var(--ink);opacity:.4;}

  /* ──────── TABLE ──────── */
  .table-area{flex:1;display:flex;padding:10px 28px 2px;min-height:0;overflow:hidden;}
  .col{flex:1;display:flex;flex-direction:column;min-width:0;padding:0 18px;}
  .col:first-child{padding-left:0;}
  .col:last-child{padding-right:0;}
  .col + .col{border-left:1px solid var(--line);}

  .col-head{
    display:grid;grid-template-columns:30px 38px 1fr 46px 40px;align-items:center;
    padding:0 8px 9px;
    color:var(--ink-dim);
    font-family:'Barlow Semi Condensed',sans-serif;
    font-size:.66rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  }
  .col-head div{text-align:center;}
  .col-head div:nth-child(3){text-align:left;padding-left:9px;}

  .col-rows{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* linea separatrice tra le zone di qualificazione */
  .zone-divider{height:0;border-top:2px solid var(--ink);opacity:.32;flex-shrink:0;}

  .row{
    position:relative;display:grid;grid-template-columns:30px 38px 1fr 46px 40px;align-items:center;
    padding:0 8px;flex:1;min-height:0;
  }
  .row.odd{background:var(--row-odd);}
  /* evidenziazione squadra (morbida) */
  .row.hl{background:var(--hi-soft);}
  .row.hl .c-name{font-weight:800;}

  .c-pos{
    font-family:var(--f-num),sans-serif;font-weight:700;text-align:center;
    color:var(--ink-dim);font-variant-numeric:tabular-nums;
  }
  body.comp-SA .c-pos{font-size:1.05rem;}
  body.comp-UCL .c-pos,body.comp-UEL .c-pos,body.comp-UECL .c-pos{font-size:.9rem;}

  .c-logo{display:flex;align-items:center;justify-content:center;}
  .c-logo img{object-fit:contain;}
  body.comp-SA .c-logo img{width:32px;height:32px;}
  body.comp-UCL .c-logo img,body.comp-UEL .c-logo img,body.comp-UECL .c-logo img{width:24px;height:24px;}
  .c-init{
    display:flex;align-items:center;justify-content:center;border-radius:50%;
    font-family:var(--f-display),sans-serif;font-weight:700;
    background:var(--chip-bg);color:var(--chip-fg);
  }
  body.comp-SA .c-init{width:30px;height:30px;font-size:.82rem;}
  body.comp-UCL .c-init,body.comp-UEL .c-init,body.comp-UECL .c-init{width:23px;height:23px;font-size:.64rem;}

  .c-name{
    font-family:var(--f-body),sans-serif;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:var(--ink);padding-left:9px;text-transform:uppercase;letter-spacing:.01em;
  }
  body.comp-SA .c-name{font-size:.97rem;font-weight:700;}
  body.comp-UCL .c-name{font-size:.81rem;font-weight:500;}
  body.comp-UEL .c-name{font-size:.81rem;font-weight:600;}
  body.comp-UECL .c-name{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.01em;}

  .c-pt{
    font-family:var(--f-num),sans-serif;font-weight:800;text-align:center;color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  body.comp-SA .c-pt{font-size:1.5rem;font-weight:900;}
  body.comp-UCL .c-pt,body.comp-UEL .c-pt,body.comp-UECL .c-pt{font-size:1.15rem;}

  .c-dr{
    font-family:var(--f-num),sans-serif;font-weight:700;text-align:center;font-size:.95rem;
    color:var(--ink-dim);font-variant-numeric:tabular-nums;
  }
  body.comp-SA .c-dr{font-size:1.05rem;}
  .c-dr.pos{color:var(--dr-pos);}
  .c-dr.neg{color:var(--dr-neg);}
  .c-dr.zer{color:var(--ink-dim);opacity:.7;}

  /* ──────── LEGEND ──────── */
  .legend{
    height:var(--leg-h);flex-shrink:0;display:flex;justify-content:center;align-items:center;
    gap:24px;padding:0 24px;border-top:1px solid var(--line);background:var(--scrim);
  }
  .legend-item{
    display:flex;align-items:center;gap:8px;
    font-family:'Barlow Semi Condensed',sans-serif;
    font-size:.84rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink);opacity:.86;
  }
  body.comp-UECL .legend-item{font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:.04em;}
  .legend-bul{width:8px;height:8px;border-radius:2px;background:var(--ink);opacity:.5;flex-shrink:0;}

  /* ──────── preview switch (solo demo) ──────── */
  .preview-bar{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:none;gap:8px;z-index:50;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
    padding:7px 9px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);
    font-family:'Barlow Semi Condensed',sans-serif;
  }
  .preview-bar.on{display:flex;}
  .preview-bar button{
    border:0;cursor:pointer;border-radius:999px;padding:6px 14px;
    font-size:.78rem;font-weight:700;letter-spacing:.08em;
    background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);transition:.15s;
  }
  .preview-bar button:hover{background:rgba(255,255,255,0.22);color:#fff;}
  .preview-bar button.active{background:#fff;color:#111;}
</style>
</head>
<body>

  <div class="preview-bar" id="previewBar"></div>

  <div class="header">
    <div class="header-title" id="heroTitle">Classifica</div>
    <div class="header-sub" id="heroSub"></div>
    <div class="header-rule"></div>
  </div>

  <div class="table-area" id="tableArea"></div>
  <div class="legend" id="legend"></div>

<script>
/* ══ NOMI SQUADRE ══
   I nomi corretti arrivano già da teams.json, applicati lato Python in
   aggiorna_classifica.py al momento di generare classifica.json.
   Qui quindi nessuna mappa: si usa il nome così com'è nei dati. */
function nome(n){ return n ? n.trim() : n; }
function initial(n){ return (n||'?').trim().charAt(0).toUpperCase(); }

/* squadra/e da evidenziare ovunque compaiano (match sul nome normalizzato) */
const HIGHLIGHT = new Set(["Juventus"]);

/* ══ CONFIG ══ */
const CFG = {
  SA:{
    titolo:"SERIE A",
    subLabel:g=>`Classifica · Giornata ${g} · 2026/27`,
    cols:2, perCol:10,
    zone:p=>{ if(p<=4)return"z1"; if(p===5)return"z2"; if(p===6)return"z3"; if(p>=18)return"z4"; return""; },
    sepAfter:[4,5,6,17],
    legend:["1–4 Champions","5 Europa","6 Conference","18–20 Retrocesse"]
  },
  UCL:{
    titolo:"CHAMPIONS LEAGUE",
    subLabel:g=>`Classifica · Giornata ${g} · 2026/27`,
    cols:2, perCol:18,
    zone:p=>{ if(p<=8)return"z1"; if(p<=24)return"z2"; return"z3"; },
    sepAfter:[8,24],
    legend:["1–8 Ottavi diretti","9–24 Playoff","25–36 Eliminate"]
  },
  UEL:{
    titolo:"EUROPA LEAGUE",
    subLabel:g=>`Classifica · Giornata ${g} · 2026/27`,
    cols:2, perCol:18,
    zone:p=>{ if(p<=8)return"z1"; if(p<=24)return"z2"; return"z3"; },
    sepAfter:[8,24],
    legend:["1–8 Ottavi diretti","9–24 Playoff","25–36 Eliminate"]
  },
  UECL:{
    titolo:"CONFERENCE LEAGUE",
    subLabel:g=>`Classifica · Giornata ${g} · 2026/27`,
    cols:2, perCol:18,
    zone:p=>{ if(p<=8)return"z1"; if(p<=24)return"z2"; return"z3"; },
    sepAfter:[8,24],
    legend:["1–8 Ottavi diretti","9–24 Playoff","25–36 Eliminate"]
  }
};

/* ══ RIGHE ══ */
function drCls(v){ return v>0?'pos':v<0?'neg':'zer'; }
function drVal(v){ return v>0?'+'+v:''+v; }

function buildRow(t, parity, zone){
  const n = nome(t.team);
  const cls = parity % 2 === 0 ? 'even' : 'odd';
  const hl = HIGHLIGHT.has(n) ? ' hl' : '';
  const badge = t.logo ? `<img src="${t.logo}" alt="">` : `<span class="c-init">${initial(n)}</span>`;
  return `<div class="row ${cls}${hl}" data-zone="${zone}">
    <div class="c-pos">${t.pos}</div>
    <div class="c-logo">${badge}</div>
    <div class="c-name">${n}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drCls(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}
function buildHead(){
  return `<div class="col-head"><div></div><div></div><div>Squadra</div><div>PT</div><div>GD</div></div>`;
}

function render(data){
  const key = (data.competition||'SA').toUpperCase();
  const cfg = CFG[key] || CFG.SA;

  document.body.className = 'comp-'+key;
  document.getElementById('heroTitle').textContent = cfg.titolo;
  document.getElementById('heroSub').textContent = cfg.subLabel(data.giornata || '—');

  const area = document.getElementById('tableArea');
  let html='';
  for(let i=0;i<cfg.cols;i++){
    const slice = data.classifica.slice(i*cfg.perCol,(i+1)*cfg.perCol);
    if(!slice.length) continue;
    let rows='';
    slice.forEach((t,idx)=>{
      const posG = i*cfg.perCol + idx + 1;
      rows += buildRow(t, idx, cfg.zone(posG));
      if(cfg.sepAfter && cfg.sepAfter.includes(posG)) rows += `<div class="zone-divider"></div>`;
    });
    html += `<div class="col">${buildHead()}<div class="col-rows">${rows}</div></div>`;
  }
  area.innerHTML = html;

  document.getElementById('legend').innerHTML = cfg.legend.map(l=>
    `<div class="legend-item"><span class="legend-bul"></span>${l}</div>`
  ).join('');
}

/* ══ DATI DEMO (solo senza dataset reale) ══ */
const DEMO_TEAMS = {
  SA:["Napoli","Inter","Atalanta","Juventus","Milan","Bologna","Roma","Lazio","Fiorentina","Como",
      "Torino","Udinese","Genoa","Verona","Cagliari","Lecce","Parma","Pisa","Cremonese","Sassuolo"],
  UCL:["Liverpool","Barcellona","Real Madrid","Man City","Arsenal","Inter","Bayern Monaco","Leverkusen",
       "B. Dortmund","Atlético Madrid","Aston Villa","Atalanta","Milan","Juventus","Napoli","PSV","Benfica",
       "Sporting CP","Feyenoord Rotterdam","Brest","Stuttgart","Lille","Bologna","Celtic","Club Brugge",
       "Monaco","Salzburg","GNK Dinamo","Crvena Zvezda","Young Boys","Shakhtar","Leipzig","Girona",
       "Sparta Praha","Sturm Graz","S. Bratislava"],
  UEL:["Roma","Tottenham","Lazio","Athletic Club","Eintracht Frankfurt","Lyon","Porto","Rangers",
       "Ajax Amsterdam","Galatasaray","Fenerbahçe","Slavia Prague","Ferencváros","Nice","Bodo/Glimt",
       "Midtjylland","Viktoria Plzeň","FCSB","PAOK Salonika","Union St.-Gilloise","Braga","Olympiacos",
       "M. Tel-Aviv","Malmö","Ludogorets Razgrad","FK Qarabag","Real Betis","Marseille","Newcastle United",
       "Nott'm Forest","Racing Genk","Utrecht","Basel","Brann","Pafos","Kairat Almaty"],
  UECL:["Fiorentina","Real Betis","Villarreal","Panathinaikos","F.C. København","Go Ahead Eagles","Freiburg",
        "Celtic","Rangers","Basel","Young Boys","Pafos","Brann","Bodo/Glimt","Malmö","Ludogorets Razgrad",
        "FCSB","FK Qarabag","M. Tel-Aviv","Kairat Almaty","PAOK Salonika","Olympiacos","Slavia Prague",
        "Sparta Praha","Viktoria Plzeň","S. Bratislava","GNK Dinamo","Crvena Zvezda","Shakhtar","Salzburg",
        "Sturm Graz","Racing Genk","Union St.-Gilloise","Utrecht","Braga","Nice"]
};
function makeDemo(key){
  const teams = DEMO_TEAMS[key]; const n = teams.length;
  return {
    competition:key,
    giornata: key==='SA' ? 14 : 6,
    classifica: teams.map((team,i)=>({
      pos:i+1, team,
      pt: Math.max(0,(n-i)*2 + ((n-i)%3) + (i<3?6:0)),
      dr: Math.round((n/2 - i) * 1.6)
    }))
  };
}

/* ══ AVVIO ══ */
(window.__CLASSIFICA__
  ? Promise.resolve(window.__CLASSIFICA__)
  : fetch('./classifica.json').then(r=>{ if(!r.ok) throw 0; return r.json(); })
).then(render)
 .catch(()=>{
   const bar = document.getElementById('previewBar');
   bar.classList.add('on');
   const comps = [['SA','Serie A'],['UCL','Champions'],['UEL','Europa'],['UECL','Conference']];
   bar.innerHTML = comps.map(c=>`<button data-k="${c[0]}">${c[1]}</button>`).join('');
   function show(k){ render(makeDemo(k)); [...bar.children].forEach(b=>b.classList.toggle('active', b.dataset.k===k)); }
   bar.querySelectorAll('button').forEach(b=>b.onclick=()=>show(b.dataset.k));
   show('SA');
 });
</script>
</body>
</html>
