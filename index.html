<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <title>Classifica</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:900px; height:1200px; overflow:hidden; }

    /* ══ VARIABILI BASE ══ */
    body {
      font-family:'Inter',sans-serif;
      color:#fff;
      display:flex;
      flex-direction:column;
    }

    /* ══ SERIE A ══ */
    body.comp-SA {
      background:
        radial-gradient(ellipse 55% 45% at 15% -5%, rgba(41,82,220,0.75) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 88% 105%, rgba(15,36,160,0.65) 0%, transparent 55%),
        radial-gradient(ellipse 70% 35% at 50% 50%, rgba(5,15,70,0.4) 0%, transparent 70%),
        #03071e;
      --c-header-hi: #7db8ff;
      --c-pts:       #7db8ff;
      --c-row-a:     rgba(255,255,255,0.07);
      --c-row-b:     rgba(0,0,0,0.12);
      --c-text-dim:  #5570bb;
      --c-zone-1:    #2b7fff;
      --c-zone-2:    #f07820;
      --c-zone-3:    #28c464;
      --c-zone-4:    #e52222;
      --row-h:       93px;
      --head-h:      160px;
      --leg-h:       56px;
      --col-gap:     14px;
    }

    /* ══ UCL ══ */
    body.comp-UCL {
      background:
        radial-gradient(ellipse 80% 38% at 50% -2%, rgba(15,38,90,0.90) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 10% 90%, rgba(0,60,140,0.3) 0%, transparent 60%),
        #040410;
      --c-header-hi: #5ab4ff;
      --c-pts:       #ffffff;
      --c-row-a:     rgba(255,255,255,0.07);
      --c-row-b:     rgba(0,0,0,0.15);
      --c-text-dim:  #446080;
      --c-zone-1:    #1db954;
      --c-zone-2:    #f5a623;
      --c-zone-3:    #e02020;
      --row-h:       49px;
      --head-h:      145px;
      --leg-h:       56px;
      --col-gap:     14px;
    }

    /* ══ UEL ══ */
    body.comp-UEL {
      background:
        radial-gradient(ellipse 80% 38% at 50% -2%, rgba(80,25,0,0.95) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 90% 90%, rgba(100,30,0,0.3) 0%, transparent 60%),
        #060200;
      --c-header-hi: #ff7030;
      --c-pts:       #ffffff;
      --c-row-a:     rgba(255,255,255,0.07);
      --c-row-b:     rgba(0,0,0,0.15);
      --c-text-dim:  #805040;
      --c-zone-1:    #1db954;
      --c-zone-2:    #f5a623;
      --c-zone-3:    #e02020;
      --row-h:       49px;
      --head-h:      145px;
      --leg-h:       56px;
      --col-gap:     14px;
    }

    /* ══ UECL ══ */
    body.comp-UECL {
      background:
        radial-gradient(ellipse 80% 38% at 50% -2%, rgba(10,50,18,0.95) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 10% 90%, rgba(5,50,15,0.3) 0%, transparent 60%),
        #020804;
      --c-header-hi: #3ecf6a;
      --c-pts:       #ffffff;
      --c-row-a:     rgba(255,255,255,0.07);
      --c-row-b:     rgba(0,0,0,0.15);
      --c-text-dim:  #3a6048;
      --c-zone-1:    #1db954;
      --c-zone-2:    #f5a623;
      --c-zone-3:    #e02020;
      --row-h:       49px;
      --head-h:      145px;
      --leg-h:       56px;
      --col-gap:     14px;
    }

    /* ── HEADER ── */
    .header {
      height:var(--head-h);
      flex-shrink:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0 44px 12px;
      gap:0;
      position:relative;
    }
    /* Glow radiale centrato sotto il titolo */
    .header::before {
      content:'';
      position:absolute;
      top:-20px; left:50%;
      transform:translateX(-50%);
      width:600px; height:180px;
      background:radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events:none;
    }
    .header-top {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
      margin-bottom:2px;
      position:relative;
    }

    /* Logo competizione nell'header */
    .header-logo {
      height:62px;
      width:auto;
      object-fit:contain;
      filter:drop-shadow(0 2px 12px rgba(0,0,0,0.6));
    }
    body.comp-UCL .header-logo,
    body.comp-UEL .header-logo,
    body.comp-UECL .header-logo { height:52px; }

    .header-title {
      font-family:'Bebas Neue',sans-serif;
      font-weight:400;
      font-size:5.8rem;
      letter-spacing:0.08em;
      color:#fff;
      line-height:1;
      text-shadow:0 0 60px rgba(100,160,255,0.25), 0 3px 20px rgba(0,0,0,0.8);
      white-space:nowrap;
    }
    body.comp-UCL .header-title  { font-size:4.2rem; letter-spacing:0.06em; }
    body.comp-UEL .header-title  { font-size:4.2rem; letter-spacing:0.06em; }
    body.comp-UECL .header-title { font-size:4.2rem; letter-spacing:0.06em; }

    .header-sub {
      font-family:'Barlow Condensed',sans-serif;
      font-size:0.85rem;
      font-weight:700;
      letter-spacing:.55em;
      text-transform:uppercase;
      color:var(--c-header-hi);
      opacity:0.8;
      text-align:center;
      margin-top:8px;
    }
    .header-divider {
      width:90%;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 20%, rgba(255,255,255,0.18) 80%,transparent);
      margin-top:12px;
    }

    /* ── TABLE AREA ── */
    .table-area {
      flex:1;
      display:flex;
      padding:10px 20px 0;
      gap:var(--col-gap);
      min-height:0;
      overflow:hidden;
    }
    .col {
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    /* Divisore verticale tra le colonne */
    .col + .col {
      border-left:1px solid rgba(255,255,255,0.08);
      padding-left:var(--col-gap);
    }

    /* ── COL HEADER ── */
    .col-head {
      display:grid;
      grid-template-columns:30px 40px 1fr 48px 42px;
      align-items:center;
      padding:3px 10px 7px;
      margin-bottom:2px;
      color:var(--c-text-dim);
      font-size:.68rem;
      font-weight:800;
      letter-spacing:.25em;
      text-transform:uppercase;
      border-bottom:1px solid rgba(255,255,255,0.10);
    }
    .col-head div { text-align:center; }
    .col-head div:nth-child(3) { text-align:left; padding-left:6px; }

    .col-rows {
      flex:1;
      display:flex;
      flex-direction:column;
      gap:0;
      overflow:hidden;
    }

    /* Separatore zona */
    .zone-divider {
      height:1px;
      background:rgba(255,255,255,0.10);
      flex-shrink:0;
      margin:1px 0;
    }

    /* ── ROW ── */
    .row {
      position:relative;
      display:grid;
      grid-template-columns:30px 40px 1fr 48px 42px;
      align-items:center;
      padding:0 10px;
      flex:1;
      min-height:0;
      border-left:3px solid var(--zone,transparent);
      transition:background .15s;
      border-radius:0 2px 2px 0;
    }
    .row.odd  { background:var(--c-row-a); }
    .row.even { background:var(--c-row-b); }

    /* Bordo Juve oro */
    .row.juve { outline:1px solid rgba(212,175,55,0.6); outline-offset:-1px; }
    .row.juve::after {
      content:'';
      position:absolute;
      inset:0; right:auto;
      width:3px;
      background:linear-gradient(180deg,#d4af37,#a88620);
    }

    /* ── CELLE ── */
    .c-pos {
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.1rem; font-weight:700;
      color:var(--c-text-dim);
      text-align:center;
      opacity:0.7;
    }
    .c-logo { display:flex; align-items:center; justify-content:center; }
    .c-logo img { object-fit:contain; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.5)); }
    body.comp-SA .c-logo img  { width:32px; height:32px; }
    body.comp-UCL .c-logo img,
    body.comp-UEL .c-logo img,
    body.comp-UECL .c-logo img { width:24px; height:24px; }

    .c-name {
      font-weight:600;
      font-size:.92rem;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      color:rgba(230,238,255,0.92);
      padding-left:8px;
      letter-spacing:.01em;
    }
    body.comp-SA .c-name  { font-size:.97rem; font-weight:700; }
    body.comp-UCL .c-name,
    body.comp-UEL .c-name,
    body.comp-UECL .c-name { font-size:.80rem; }

    .c-pt {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:900;
      text-align:center;
      letter-spacing:.02em;
    }
    body.comp-SA .c-pt  { font-size:1.55rem; color:var(--c-pts); }
    body.comp-UCL .c-pt,
    body.comp-UEL .c-pt,
    body.comp-UECL .c-pt { font-size:1.15rem; }

    /* Colore punti per zona UCL/UEL/UECL */
    body.comp-UCL .row[data-zone="z1"] .c-pt,
    body.comp-UEL .row[data-zone="z1"] .c-pt,
    body.comp-UECL .row[data-zone="z1"] .c-pt { color:#1db954; }
    body.comp-UCL .row[data-zone="z2"] .c-pt,
    body.comp-UEL .row[data-zone="z2"] .c-pt,
    body.comp-UECL .row[data-zone="z2"] .c-pt { color:#f5a623; }
    body.comp-UCL .row[data-zone="z3"] .c-pt,
    body.comp-UEL .row[data-zone="z3"] .c-pt,
    body.comp-UECL .row[data-zone="z3"] .c-pt { color:#e87070; }

    .c-dr {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      text-align:center;
      font-size:.95rem;
      opacity:0.82;
    }
    body.comp-SA .c-dr  { font-size:1.1rem; }

    .c-dr.pos { color:#4ade80; }
    .c-dr.neg { color:#f87171; }
    .c-dr.zer { color:var(--c-text-dim); }

    /* ── LEGEND ── */
    .legend {
      height:var(--leg-h);
      flex-shrink:0;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:28px;
      padding:0 24px;
      border-top:1px solid rgba(255,255,255,0.07);
      background:rgba(0,0,0,0.15);
    }
    .legend-item {
      display:flex; align-items:center; gap:9px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:.9rem; font-weight:700;
      letter-spacing:.18em; text-transform:uppercase;
      color:rgba(255,255,255,0.42);
    }
    .legend-dot {
      width:10px; height:10px;
      border-radius:50%;
      flex-shrink:0;
      box-shadow:0 0 6px currentColor;
    }
  </style>
</head>
<body>

    <div class="header-divider"></div>

};

function drCls(v){ return v>0?'pos':v<0?'neg':'zer'; }
function drVal(v){ return v>0?'+'+v:''+v; }

function buildRow(t, zInfo, parity) {
  const n = nome(t.team);
  const isJ = n.toLowerCase().includes('juv');
  const logo = t.logo ? `<img src="${t.logo}" alt="">` : '';
  const cls = parity % 2 === 0 ? 'even' : 'odd';
  return `<div class="row ${cls}${isJ?' juve':''}" style="--zone:${zInfo.color}" data-zone="${zInfo.key}">
    <div class="c-pos">${t.pos}</div>
    <div class="c-logo">${logo}</div>
    <div class="c-name">${n}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drCls(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}

function buildHead() {
  return `<div class="col-head">
    <div></div><div></div><div>Squadra</div><div>PT</div><div>GD</div>
  </div>`;
}

(window.__CLASSIFICA__ ? Promise.resolve(window.__CLASSIFICA__) : fetch('./classifica.json').then(r=>r.json()))
  .then(data => {
    const key = (data.competition||'SA').toUpperCase();
    const cfg = CFG[key] || CFG.SA;

    document.body.classList.add('comp-'+key);

    /* Titolo e sottotitolo */
    document.getElementById('heroTitle').textContent = cfg.titolo;
    document.getElementById('heroSub').textContent = cfg.subLabel(data.giornata || '—');

    /* Tabella */
    const area = document.getElementById('tableArea');
    let html = '';
    for(let i=0; i<cfg.cols; i++){
      const slice = data.classifica.slice(i*cfg.perCol,(i+1)*cfg.perCol);
      if(!slice.length) continue;
      let rows='';
      let parity=0;
      slice.forEach((t,idx)=>{
        const posG = i*cfg.perCol + idx + 1;
        const zi = cfg.zone(posG);
        rows += buildRow(t, zi, parity);
        parity++;
        if(cfg.sepAfter && cfg.sepAfter.includes(posG)){
          rows += `<div class="zone-divider"></div>`;
        }
      });
      html += `<div class="col">${buildHead()}<div class="col-rows">${rows}</div></div>`;
    }
    area.innerHTML = html;

    /* Legenda */
    document.getElementById('legend').innerHTML = cfg.legend.map(l=>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${l.color}"></div>${l.label}
      </div>`
    ).join('');
  });
</script>
</body>
</html>
