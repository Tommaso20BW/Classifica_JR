<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<title>Classifica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Barlow+Semi+Condensed:wght@500;600;700;800&family=Roboto+Slab:wght@600;700;800;900&family=Saira:wght@500;600;700;800&family=Saira+Semi+Condensed:wght@500;600;700;800&family=Sofia+Sans+Semi+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:900px;height:1200px;overflow:hidden;}

  body{
    color:var(--ink);display:flex;flex-direction:column;position:relative;
    font-family:var(--f-body),sans-serif;background-color:var(--base);
    --head-h:136px;--leg-h:62px;
    --f-display:'Saira';--f-body:'Saira Semi Condensed';--f-num:'Saira';
  }
  body::after{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(circle at 52% 36%,transparent 24%,rgba(0,0,0,.17) 100%);
  }
  .header,.table-area,.legend{position:relative;z-index:1;}

  /* ════ SERIE A — bianco, azzurro e blu ════ */
  body.comp-SA{
    background:
      linear-gradient(180deg,transparent 0 136px,rgba(239,246,255,.80) 136px 100%),
      repeating-linear-gradient(135deg,rgba(22,111,255,.035) 0 2px,transparent 2px 34px),
      #f6f9fd;
    --base:#f6f9fd;
    --f-display:'Archivo';--f-body:'Archivo';--f-num:'Archivo';
    --ink:#102345;--ink-dim:#71809a;--head-ink:#fff;
    --row-odd:rgba(20,87,175,.045);--line:rgba(19,55,105,.14);--scrim:rgba(255,255,255,.88);
    --chip-bg:#e5eefb;--chip-fg:#174a98;
    --dr-pos:#09864e;--dr-neg:#c53343;
    --z1:#1388ff;--z2:#ff7b32;--z3:#08ac73;--z4:#e83f55;
  }
  body.comp-SA::after{background:linear-gradient(90deg,rgba(28,111,255,.035),transparent 35%,rgba(22,55,145,.035));}

  /* ════ UEFA CHAMPIONS LEAGUE — Kick of Light ════ */
  body.comp-UCL{
    background:
      url("ucl-texture-hq.webp") center top / cover no-repeat,
      #02051b;
    --base:#02051b;
    --f-display:'Saira';--f-body:'Saira Semi Condensed';--f-num:'Saira';
    --ink:#f5f7ff;--ink-dim:rgba(220,227,255,.68);--head-ink:#fff;
    --row-odd:rgba(255,255,255,.045);--line:rgba(136,177,255,.18);--scrim:rgba(0,2,20,.72);
    --chip-bg:rgba(86,143,255,.22);--chip-fg:#fff;
    --dr-pos:#8cf3d2;--dr-neg:#ff9aa8;
    --z1:#50e2ff;--z2:#8f85ff;--z3:#ff668a;
  }

  /* ════ UEFA EUROPA LEAGUE — nero e arancione ════ */
  body.comp-UEL{
    background:
      url("uel-texture-hq.webp") center top / 1600px auto no-repeat,
      #030303;
    --base:#030303;
    --f-display:'Roboto Slab';--f-body:'Barlow Semi Condensed';--f-num:'Barlow Semi Condensed';
    --ink:#fff7ef;--ink-dim:rgba(255,224,203,.66);--head-ink:#fff;
    --row-odd:rgba(255,100,19,.055);--line:rgba(255,98,18,.24);--scrim:rgba(0,0,0,.76);
    --chip-bg:rgba(255,91,12,.22);--chip-fg:#fff;
    --dr-pos:#8de7ac;--dr-neg:#ff956f;
    --z1:#ff6a17;--z2:#ffb020;--z3:#e64d45;
  }

  /* ════ UEFA CONFERENCE LEAGUE — nero e verde ════ */
  body.comp-UECL{
    background:
      url("uecl-texture-hq.webp") left bottom / 1540px auto no-repeat,
      #020403;
    --base:#020403;
    --f-display:'Sofia Sans Semi Condensed';--f-body:'Sofia Sans Semi Condensed';--f-num:'Sofia Sans Semi Condensed';
    --ink:#f3fff7;--ink-dim:rgba(202,255,221,.66);--head-ink:#fff;
    --row-odd:rgba(0,211,98,.052);--line:rgba(0,220,104,.22);--scrim:rgba(0,0,0,.76);
    --chip-bg:rgba(0,204,91,.20);--chip-fg:#fff;
    --dr-pos:#8fffc0;--dr-neg:#ff9e9e;
    --z1:#00d763;--z2:#a7f13e;--z3:#ea5d5d;
  }

  /* ──────── HEADER: compatto, senza marchi decorativi ──────── */
  .header{
    height:var(--head-h);flex-shrink:0;padding:13px 40px 10px;text-align:left;
    display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
    color:var(--head-ink);
  }
  body.comp-SA .header{background:linear-gradient(105deg,#0268d7 0%,#168eff 55%,#2448ca 100%);}
  body.comp-UCL .header{background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),linear-gradient(90deg,rgba(1,4,28,.92),rgba(5,17,75,.44),rgba(0,0,0,.04));}
  body.comp-UEL .header{background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),linear-gradient(90deg,rgba(0,0,0,.92),rgba(23,6,0,.52),transparent);}
  body.comp-UECL .header{background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),linear-gradient(90deg,rgba(0,0,0,.92),rgba(0,25,12,.54),transparent);}

  .titleline{height:100px;display:flex;align-items:center;gap:16px;min-width:0;position:relative;z-index:1;}
  .titlecopy{display:flex;flex-direction:column;justify-content:center;min-width:0;}
  .competition-mark{height:96px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .competition-mark img{display:block;max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;}
  body.comp-SA .competition-mark{width:76px;}
  body.comp-SA .competition-mark img{width:76px;height:90px;}
  body.comp-UCL .competition-mark{width:75px;height:112px;}
  body.comp-UEL .competition-mark{width:78px;height:112px;}
  body.comp-UECL .competition-mark{width:84px;height:112px;}
  body.comp-UCL .competition-mark img,body.comp-UEL .competition-mark img,body.comp-UECL .competition-mark img{
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.45));
  }
  body.comp-UCL .competition-mark img{transform:scaleX(1.06);}
  /* I PNG UEL/UECL hanno più trasparenza sopra che sotto: compensazione ottica. */
  body.comp-UEL .competition-mark img{transform:translateY(-9px);}
  body.comp-UECL .competition-mark img{transform:translateY(-10px);}

  .header-title{font-family:var(--f-display),sans-serif;line-height:.94;white-space:nowrap;color:var(--head-ink);}
  body.comp-SA .header-title{font-weight:900;font-size:3.7rem;letter-spacing:.005em;}
  body.comp-UCL .header-title{font-weight:700;font-size:3.05rem;letter-spacing:.045em;text-transform:uppercase;}
  body.comp-UEL .header-title{font-weight:800;font-size:3.18rem;letter-spacing:.005em;text-transform:uppercase;}
  body.comp-UECL .header-title{font-weight:900;font-size:3.02rem;letter-spacing:.01em;text-transform:uppercase;}

  .header-sub{
    font-family:var(--f-body),sans-serif;font-size:.84rem;font-weight:700;
    letter-spacing:.19em;text-transform:uppercase;color:rgba(255,255,255,.72);
    margin-top:8px;
  }
  body.comp-UECL .header-sub{letter-spacing:.15em;}

  /* ──────── TABLE ──────── */
  .table-area{flex:1;display:flex;gap:19px;padding:17px 28px 9px;min-height:0;overflow:hidden;}
  .col{flex:1;display:flex;flex-direction:column;min-width:0;}
  .col + .col{border-left:1px solid var(--line);padding-left:19px;}
  body.comp-SA .col{background:rgba(255,255,255,.72);border-radius:10px;padding-top:9px;box-shadow:0 12px 30px rgba(20,63,126,.07);}
  body.comp-SA .col:first-child{padding-left:0;}
  body.comp-SA .col + .col{padding-left:19px;border-radius:10px;}

  .col-head{
    display:grid;grid-template-columns:29px 33px minmax(0,1fr) 42px 38px;align-items:center;
    padding:0 7px 8px;color:var(--ink-dim);font-family:var(--f-body),sans-serif;
    font-size:.68rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  }
  .col-head div{text-align:center;}
  .col-head div:nth-child(3){text-align:left;padding-left:8px;}
  .col-rows{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .zone-divider{height:0;border-top:1px solid var(--line);opacity:.92;flex-shrink:0;}

  .row{
    position:relative;display:grid;grid-template-columns:29px 33px minmax(0,1fr) 42px 38px;align-items:center;
    padding:0 7px;flex:1;min-height:0;border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:0;}
  .row::before{content:"";position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:0 2px 2px 0;background:transparent;}
  .row[data-zone="z1"]::before{background:var(--z1);}
  .row[data-zone="z2"]::before{background:var(--z2);}
  .row[data-zone="z3"]::before{background:var(--z3);}
  .row[data-zone="z4"]::before{background:var(--z4);}
  .row.odd{background:var(--row-odd);}
  body.comp-SA .row.hl{background:linear-gradient(90deg,rgba(15,119,238,.18),rgba(63,146,255,.06));}
  body.comp-UCL .row.hl{background:linear-gradient(90deg,rgba(56,219,255,.20),rgba(112,78,255,.15),rgba(255,76,196,.10));}
  body.comp-UEL .row.hl{background:linear-gradient(90deg,rgba(255,104,17,.25),rgba(255,104,17,.06));}
  body.comp-UECL .row.hl{background:linear-gradient(90deg,rgba(0,216,101,.25),rgba(0,216,101,.06));}
  .row.hl .c-name{font-weight:900;}

  .c-pos{font-family:var(--f-num),sans-serif;font-weight:700;text-align:center;color:var(--ink-dim);font-variant-numeric:tabular-nums;}
  body.comp-SA .c-pos{font-size:1.05rem;}
  body.comp-UCL .c-pos,body.comp-UEL .c-pos,body.comp-UECL .c-pos{font-size:.88rem;}

  .c-logo{display:flex;align-items:center;justify-content:center;}
  .c-logo img{object-fit:contain;filter:none;}
  body.comp-SA .c-logo img{width:32px;height:32px;}
  body.comp-UCL .c-logo img,body.comp-UEL .c-logo img,body.comp-UECL .c-logo img{width:24px;height:24px;}
  .c-init{display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:var(--f-display),sans-serif;font-weight:800;background:var(--chip-bg);color:var(--chip-fg);}
  body.comp-SA .c-init{width:30px;height:30px;font-size:.78rem;}
  body.comp-UCL .c-init,body.comp-UEL .c-init,body.comp-UECL .c-init{width:23px;height:23px;font-size:.65rem;}

  .c-name{
    font-family:var(--f-body),sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:var(--ink);padding-left:8px;text-transform:uppercase;letter-spacing:.005em;
  }
  body.comp-SA .c-name{font-size:.96rem;font-weight:700;}
  body.comp-UCL .c-name{font-size:.84rem;font-weight:600;letter-spacing:.01em;}
  body.comp-UEL .c-name{font-size:.86rem;font-weight:700;letter-spacing:.015em;}
  body.comp-UECL .c-name{font-size:.86rem;font-weight:800;letter-spacing:.012em;}

  .c-pt{font-family:var(--f-num),sans-serif;font-weight:900;text-align:center;color:var(--ink);font-variant-numeric:tabular-nums;}
  body.comp-SA .c-pt{font-size:1.42rem;}
  body.comp-UCL .c-pt,body.comp-UEL .c-pt,body.comp-UECL .c-pt{font-size:1.11rem;}
  .c-dr{font-family:var(--f-num),sans-serif;font-weight:700;text-align:center;font-size:.91rem;color:var(--ink-dim);font-variant-numeric:tabular-nums;}
  body.comp-SA .c-dr{font-size:1.02rem;}
  .c-dr.pos{color:var(--dr-pos);}.c-dr.neg{color:var(--dr-neg);}.c-dr.zer{color:var(--ink-dim);opacity:.75;}

  /* ──────── LEGEND ──────── */
  .legend{
    height:var(--leg-h);flex-shrink:0;display:flex;justify-content:center;align-items:center;
    gap:23px;padding:0 24px;border-top:1px solid var(--line);background:var(--scrim);
  }
  .legend-item{display:flex;align-items:center;gap:8px;font-family:var(--f-body),sans-serif;font-size:.79rem;font-weight:800;letter-spacing:.075em;text-transform:uppercase;color:var(--ink);opacity:.92;}
  .legend-bul{width:8px;height:8px;border-radius:2px;background:var(--z1);flex-shrink:0;}
  .legend-item:nth-child(2) .legend-bul{background:var(--z2);}
  .legend-item:nth-child(3) .legend-bul{background:var(--z3);}
  .legend-item:nth-child(4) .legend-bul{background:var(--z4);}

  /* ──────── Serie A: ripristino del design approvato ──────── */
  body.comp-SA{background:#f7faff;--base:#f7faff;--line:#dce8f8;--scrim:#062d79;}
  body.comp-SA::after{background:transparent;}
  body.comp-SA .header{
    position:relative;overflow:hidden;
    background:linear-gradient(128deg,#052878 0 43%,#0757d7 43% 68%,#12b9f1 68% 100%);
  }
  body.comp-SA .header-title{font-size:3.38rem;letter-spacing:-.035em;}
  body.comp-SA .table-area{gap:22px;padding:17px 27px 9px;background:#f7faff;}
  body.comp-SA .col{background:transparent;border-radius:0;padding-top:0;box-shadow:none;}
  body.comp-SA .col + .col{border-left:2px solid #d8e6ff;padding-left:22px;border-radius:0;}
  body.comp-SA .col-head{
    grid-template-columns:38px 58px minmax(0,1fr) 52px 48px;height:34px;flex:0 0 34px;
    padding:0 5px;border-bottom:2px solid #1669d8;color:#174c9b;
    font-size:.68rem;letter-spacing:.15em;
  }
  body.comp-SA .row{
    grid-template-columns:38px 58px minmax(0,1fr) 52px 48px;padding:0 5px;
    border-bottom:1px solid #dce8f8;color:#08245e;
  }
  body.comp-SA .row::before{display:none;}
  body.comp-SA .row.odd{background:transparent;}
  body.comp-SA .row.even{background:#edf4ff;}
  body.comp-SA .row.hl{
    color:#fff;background:linear-gradient(90deg,#063d9e,#0c70dd);
    box-shadow:inset 5px 0 #16c9f4;
  }
  body.comp-SA .row.hl .c-pos,body.comp-SA .row.hl .c-name,
  body.comp-SA .row.hl .c-pt,body.comp-SA .row.hl .c-dr{color:#fff;}
  body.comp-SA .c-pos{font-size:1.05rem;color:#2b6fc2;font-weight:900;}
  body.comp-SA .c-logo img{width:46px;height:46px;}
  body.comp-SA .c-init{width:44px;height:44px;font-size:.84rem;background:#fff;color:#0b56bd;border:1px solid #b9d1f4;}
  body.comp-SA .c-name{font-size:1.12rem;font-weight:700;padding-left:9px;letter-spacing:-.012em;}
  body.comp-SA .c-pt{font-size:1.62rem;}
  body.comp-SA .c-dr{font-size:.94rem;color:#5681b7;}
  body.comp-SA .legend{background:#062d79;border:0;}
  body.comp-SA .legend-item{color:#fff;font-size:.65rem;letter-spacing:.08em;}
  body.comp-SA .legend-bul,body.comp-SA .legend-item:nth-child(n) .legend-bul{background:#25cbea;}

  /* Overlay nero uniforme al 55% su header, classifica e legenda UEFA. */
  body.comp-UCL .table-area,body.comp-UEL .table-area,body.comp-UECL .table-area{
    background:rgba(0,0,0,.55);
  }
  body.comp-UCL .legend,body.comp-UEL .legend,body.comp-UECL .legend{background:rgba(0,0,0,.55);}
  .col-head,.row{text-shadow:none;}

  /* ──────── preview switch (solo demo) ──────── */
  .preview-bar{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:none;gap:8px;z-index:50;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
    padding:7px 9px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);
    font-family:'Barlow Semi Condensed',sans-serif;
  }
  .preview-bar.on{display:flex;}
  .preview-bar button{
    border:0;cursor:pointer;border-radius:999px;padding:6px 14px;
    font-size:.78rem;font-weight:700;letter-spacing:.08em;
    background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);transition:.15s;
  }
  .preview-bar button:hover{background:rgba(255,255,255,0.22);color:#fff;}
  .preview-bar button.active{background:#fff;color:#111;}
</style>
</head>
<body>

  <div class="preview-bar" id="previewBar"></div>

  <div class="header">
    <div class="titleline">
      <span class="competition-mark" aria-hidden="true"><img id="competitionIcon" src="serie-a-scudetto.png" alt=""></span>
      <div class="titlecopy">
        <div class="header-title" id="heroTitle">Classifica</div>
        <div class="header-sub" id="heroSub"></div>
      </div>
    </div>
  </div>

  <div class="table-area" id="tableArea"></div>
  <div class="legend" id="legend"></div>

<script>
/* ══ NOMI SQUADRE ══
   I nomi corretti arrivano già da teams.json, applicati lato Python in
   aggiorna_classifica.py al momento di generare classifica.json.
   Qui quindi nessuna mappa: si usa il nome così com'è nei dati. */
function nome(n){ return n ? n.trim() : n; }
function initial(n){ return (n||'?').trim().charAt(0).toUpperCase(); }

/* stagione corrente ("2026/27") ricavata dalla data: usata come fallback
   se classifica.json non contiene il campo "stagione". La stagione inizia a luglio. */
function stagioneCorrente(){
  const o = new Date();
  const inizio = o.getMonth() >= 6 ? o.getFullYear() : o.getFullYear() - 1; // getMonth(): luglio = 6
  return inizio + '/' + String((inizio + 1) % 100).padStart(2, '0');
}

/* squadra/e da evidenziare ovunque compaiano (match sul nome normalizzato) */
const HIGHLIGHT = new Set(["Juventus"]);

/* ══ CONFIG ══ */
const CFG = {
  SA:{
    titolo:"SERIE A",
    subLabel:(g,s)=>`Classifica · Giornata ${g} · ${s}`,
    cols:2, perCol:10,
    zone:p=>{ if(p<=4)return"z1"; if(p===5)return"z2"; if(p===6)return"z3"; if(p>=18)return"z4"; return""; },
    sepAfter:[],
    legend:["1–4 Champions","5 Europa","6 Conference","18–20 Retrocesse"]
  },
  UCL:{
    titolo:"CHAMPIONS LEAGUE",
    subLabel:(g,s)=>`Classifica · Giornata ${g} · ${s}`,
    cols:2, perCol:18,
    zone:p=>{ if(p<=8)return"z1"; if(p<=24)return"z2"; return"z3"; },
    sepAfter:[8,24],
    legend:["1–8 Ottavi diretti","9–24 Playoff","25–36 Eliminate"]
  },
  UEL:{
    titolo:"EUROPA LEAGUE",
    subLabel:(g,s)=>`Classifica · Giornata ${g} · ${s}`,
    cols:2, perCol:18,
    zone:p=>{ if(p<=8)return"z1"; if(p<=24)return"z2"; return"z3"; },
    sepAfter:[8,24],
    legend:["1–8 Ottavi diretti","9–24 Playoff","25–36 Eliminate"]
  },
  UECL:{
    titolo:"CONFERENCE LEAGUE",
    subLabel:(g,s)=>`Classifica · Giornata ${g} · ${s}`,
    cols:2, perCol:18,
    zone:p=>{ if(p<=8)return"z1"; if(p<=24)return"z2"; return"z3"; },
    sepAfter:[8,24],
    legend:["1–8 Ottavi diretti","9–24 Playoff","25–36 Eliminate"]
  }
};

/* ══ RIGHE ══ */
function drCls(v){ return v>0?'pos':v<0?'neg':'zer'; }
function drVal(v){ return v>0?'+'+v:''+v; }

const COMPETITION_ICONS = {
  SA:'serie-a-scudetto.png',
  UCL:'ucl-mark.png',
  UEL:'uel-mark.png',
  UECL:'uecl-mark.png'
};

function buildRow(t, parity, zone, key){
  const n = nome(t.team);
  const cls = parity % 2 === 0 ? 'even' : 'odd';
  const hl = HIGHLIGHT.has(n) ? ' hl' : '';
  const badge = t.logo ? `<img src="${t.logo}" alt="">` : `<span class="c-init">${initial(n)}</span>`;
  const posizione = key === 'SA' ? String(t.pos).padStart(2,'0') : t.pos;
  return `<div class="row ${cls}${hl}" data-zone="${zone}">
    <div class="c-pos">${posizione}</div>
    <div class="c-logo">${badge}</div>
    <div class="c-name">${n}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drCls(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}
function buildHead(key){
  return `<div class="col-head"><div>${key === 'SA' ? 'Pos' : ''}</div><div></div><div>Squadra</div><div>PT</div><div>${key === 'SA' ? 'DR' : 'GD'}</div></div>`;
}

function render(data){
  const key = (data.competition||'SA').toUpperCase();
  const cfg = CFG[key] || CFG.SA;

  document.body.className = 'comp-'+key;
  document.getElementById('heroTitle').textContent = cfg.titolo;
  document.getElementById('competitionIcon').src = COMPETITION_ICONS[key] || COMPETITION_ICONS.SA;
  const stagione = data.stagione || stagioneCorrente();
  document.getElementById('heroSub').textContent = cfg.subLabel(data.giornata || '—', stagione);

  const area = document.getElementById('tableArea');
  let html='';
  for(let i=0;i<cfg.cols;i++){
    const slice = data.classifica.slice(i*cfg.perCol,(i+1)*cfg.perCol);
    if(!slice.length) continue;
    let rows='';
    slice.forEach((t,idx)=>{
      const posG = i*cfg.perCol + idx + 1;
      rows += buildRow(t, idx, cfg.zone(posG), key);
      if(cfg.sepAfter && cfg.sepAfter.includes(posG)) rows += `<div class="zone-divider"></div>`;
    });
    html += `<div class="col">${buildHead(key)}<div class="col-rows">${rows}</div></div>`;
  }
  area.innerHTML = html;

  document.getElementById('legend').innerHTML = cfg.legend.map(l=>
    `<div class="legend-item"><span class="legend-bul"></span>${l}</div>`
  ).join('');
}

      dr: Math.round((n/2 - i) * 1.6)
    }))
  };
}
