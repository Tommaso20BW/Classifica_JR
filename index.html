<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <title>Classifica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:  900px;
      height: 1200px;
      overflow: hidden;
    }

    /* ══ TEMI ══ */
    body {
      --c-bg-a:      #0a1a6e;
      --c-bg-b:      #061050;
      --c-bg-base:   #04093a;
      --c-header-hi: #4a9fff;
      --c-row-odd:   rgba(255,255,255,0.06);
      --c-row-even:  rgba(255,255,255,0.00);
      --c-row-border:rgba(255,255,255,0.08);
      --c-text:      #ffffff;
      --c-text-dim:  #7a8ecc;
      --c-pts:       #5aabff;
      --c-zone-ucl:  #1a6bdc;
      --c-zone-uel:  #e87010;
      --c-zone-uecl: #22a855;
      --c-zone-rel:  #dc2020;
      --c-juve:      #d4af37;
      --c-texture:   url("data:image/svg+xml,%3Csvg width='900' height='1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='g1' cx='15%25' cy='10%25' r='55%25'%3E%3Cstop offset='0' stop-color='%231a3fc4' stop-opacity='.55'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3CradialGradient id='g2' cx='85%25' cy='90%25' r='55%25'%3E%3Cstop offset='0' stop-color='%230d2090' stop-opacity='.45'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1200' fill='%23040930'/%3E%3Crect width='900' height='1200' fill='url(%23g1)'/%3E%3Crect width='900' height='1200' fill='url(%23g2)'/%3E%3Ccircle cx='450' cy='600' r='380' fill='none' stroke='%231a3fc4' stroke-width='1' stroke-opacity='.08'/%3E%3Ccircle cx='450' cy='600' r='280' fill='none' stroke='%231a3fc4' stroke-width='1' stroke-opacity='.06'/%3E%3Ccircle cx='450' cy='600' r='180' fill='none' stroke='%231a3fc4' stroke-width='1' stroke-opacity='.04'/%3E%3Cline x1='0' y1='0' x2='900' y2='1200' stroke='%231a3fc4' stroke-width='.5' stroke-opacity='.05'/%3E%3Cline x1='900' y1='0' x2='0' y2='1200' stroke='%231a3fc4' stroke-width='.5' stroke-opacity='.05'/%3E%3C/svg%3E");
      --row-h: 93px;
      --head-h: 170px;
      --leg-h: 52px;
    }

    body.comp-UCL, body.comp-UEL {
      --c-bg-a:      #1a0560;
      --c-bg-b:      #3a0090;
      --c-bg-base:   #08002a;
      --c-header-hi: #c080ff;
      --c-row-odd:   rgba(255,255,255,0.06);
      --c-row-even:  rgba(255,255,255,0.00);
      --c-row-border:rgba(160,80,255,0.15);
      --c-text-dim:  #9070c0;
      --c-pts:       #c080ff;
      --c-zone-ucl:  #7040e0;
      --c-zone-uel:  #e040e0;
      --c-zone-uecl: #94a3b8;
      --c-zone-rel:  #dc2020;
      --c-texture:   url("data:image/svg+xml,%3Csvg width='900' height='1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='g1' cx='20%25' cy='5%25' r='60%25'%3E%3Cstop offset='0' stop-color='%232000a0' stop-opacity='.7'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3CradialGradient id='g2' cx='80%25' cy='95%25' r='60%25'%3E%3Cstop offset='0' stop-color='%23c000ff' stop-opacity='.35'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3CradialGradient id='g3' cx='50%25' cy='50%25' r='40%25'%3E%3Cstop offset='0' stop-color='%236000c0' stop-opacity='.2'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1200' fill='%2305001a'/%3E%3Crect width='900' height='1200' fill='url(%23g1)'/%3E%3Crect width='900' height='1200' fill='url(%23g2)'/%3E%3Crect width='900' height='1200' fill='url(%23g3)'/%3E%3Ccircle cx='450' cy='600' r='420' fill='none' stroke='%238040d0' stroke-width='1' stroke-opacity='.07'/%3E%3Ccircle cx='450' cy='600' r='300' fill='none' stroke='%238040d0' stroke-width='1' stroke-opacity='.05'/%3E%3C/svg%3E");
      --row-h: 49px;
      --head-h: 150px;
      --leg-h: 52px;
    }

    body.comp-UEL {
      --c-bg-a:      #5a1000;
      --c-bg-b:      #2a0800;
      --c-bg-base:   #120300;
      --c-header-hi: #ff7040;
      --c-row-border:rgba(220,70,20,0.18);
      --c-text-dim:  #b05030;
      --c-pts:       #ff7040;
      --c-zone-ucl:  #d04010;
      --c-zone-uel:  #e09020;
      --c-texture:   url("data:image/svg+xml,%3Csvg width='900' height='1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CradialGradient id='g1' cx='15%25' cy='10%25' r='60%25'%3E%3Cstop offset='0' stop-color='%23c02000' stop-opacity='.65'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3CradialGradient id='g2' cx='85%25' cy='90%25' r='55%25'%3E%3Cstop offset='0' stop-color='%23802000' stop-opacity='.5'/%3E%3Cstop offset='1' stop-color='transparent'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='900' height='1200' fill='%230a0200'/%3E%3Crect width='900' height='1200' fill='url(%23g1)'/%3E%3Crect width='900' height='1200' fill='url(%23g2)'/%3E%3C/svg%3E");
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--c-text);
      background-image: var(--c-texture);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      height: var(--head-h);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px 14px;
    }
    .header-title {
      font-family: 'Anton', sans-serif;
      font-size: 5.8rem;
      letter-spacing: 0.10em;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
      text-align: center;
      white-space: nowrap;
    }
    /* titoli lunghi (UCL, UEL): riduco font */
    .header-title.long {
      font-size: 4rem;
    }
    .header-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--c-header-hi);
      margin-top: 4px;
      text-align: center;
    }
    .header-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin-top: 12px;
    }

    /* ── TABLE AREA ── */
    .table-area {
      flex: 1;
      display: flex;
      padding: 10px 18px 0;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    /* ── COLUMN ── */
    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── COL HEADER ── */
    .col-head {
      display: grid;
      grid-template-columns: 30px 40px 1fr 44px 40px;
      align-items: center;
      padding: 4px 8px 6px;
      margin-bottom: 4px;
      color: var(--c-text-dim);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .col-head div { text-align: center; }
    .col-head div:nth-child(3) { text-align: left; padding-left: 4px; }

    /* ── COL-ROWS ── */
    .col-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    /* ── ROW ── */
    .row {
      position: relative;
      display: grid;
      grid-template-columns: 30px 40px 1fr 44px 40px;
      align-items: center;
      border-radius: 6px;
      padding: 0 8px;
      border: 1px solid var(--c-row-border);
      flex: 1;
      min-height: 0;
    }
    .row:nth-child(odd)  { background: var(--c-row-odd); }
    .row:nth-child(even) { background: var(--c-row-even); }

    .row::before {
      content: "";
      position: absolute;
      left: 0; top: 12%; height: 76%;
      width: 4px;
      border-radius: 0 3px 3px 0;
      background: var(--zone, transparent);
    }

    /* ── CELLE ── */
    .c-pos {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--c-text-dim);
      text-align: center;
    }
    .c-logo {
      display: flex; align-items: center; justify-content: center;
    }
    .c-logo img { width: 34px; height: 34px; object-fit: contain; }
    .c-name {
      font-size: 1rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #eef2ff;
      padding-left: 6px;
    }
    .c-pt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 900;
      color: var(--c-pts);
      text-align: center;
    }
    .c-dr {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      text-align: center;
    }
    .c-dr.pos { color: #4ade80; }
    .c-dr.neg { color: #f87171; }
    .c-dr.zer { color: var(--c-text-dim); }

    .row.juve { border-color: var(--c-juve) !important; }

    /* comp-18: 2 colonne da 18 squadre — righe più compatte */
    body.comp-18 .c-logo img { width: 26px; height: 26px; }
    body.comp-18 .c-name  { font-size: .82rem; }
    body.comp-18 .c-pt    { font-size: 1.2rem; }
    body.comp-18 .c-dr    { font-size: 1rem; }
    body.comp-18 .c-pos   { font-size: 1.1rem; }
    body.comp-18 .col-head { font-size: .7rem; }

    /* ── LEGEND ── */
    .legend {
      height: var(--leg-h);
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 8px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .95rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--c-text-dim);
    }
    .legend-dot {
      width: 13px; height: 13px; border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title" id="heroTitle">Classifica</div>
    <div class="header-sub"  id="heroSub">Giornata —</div>
    <div class="header-divider"></div>
  </div>

  <div class="table-area" id="tableArea"></div>

  <div class="legend" id="legend"></div>

<script>
const MAPPA_NOMI = {
  "juventus fc":"Juventus","juventus":"Juventus",
  "inter milan":"Inter","fc internazionale milano":"Inter","inter":"Inter","internazionale":"Inter",
  "ac milan":"Milan","milan":"Milan",
  "ssc napoli":"Napoli","napoli":"Napoli",
  "as roma":"Roma","roma":"Roma",
  "ss lazio":"Lazio","lazio":"Lazio",
  "atalanta bc":"Atalanta","atalanta":"Atalanta",
  "bologna fc 1909":"Bologna","bologna fc":"Bologna","bologna":"Bologna",
  "acf fiorentina":"Fiorentina","fiorentina":"Fiorentina",
  "torino fc":"Torino","torino":"Torino",
  "udinese calcio":"Udinese","udinese":"Udinese",
  "empoli fc":"Empoli","empoli":"Empoli",
  "us lecce":"Lecce","lecce":"Lecce",
  "ac monza":"Monza","monza":"Monza",
  "cagliari calcio":"Cagliari","cagliari":"Cagliari",
  "genoa cfc":"Genoa","genoa":"Genoa",
  "como 1907":"Como","como":"Como",
  "parma calcio 1913":"Parma","parma calcio":"Parma","parma":"Parma",
  "venezia fc":"Venezia","venezia":"Venezia",
  "hellas verona fc":"Verona","hellas verona":"Verona","hell verona fc":"Verona",
  "us sassuolo calcio":"Sassuolo","us sassuolo":"Sassuolo","sassuolo":"Sassuolo",
  "us salernitana 1919":"Salernitana","us salernitana":"Salernitana","salernitana":"Salernitana",
  "frosinone calcio":"Frosinone","frosinone":"Frosinone",
  "us cremonese":"Cremonese","cremonese":"Cremonese",
  "us catanzaro 1929":"Catanzaro","us catanzaro":"Catanzaro","catanzaro":"Catanzaro",
  "palermo fc":"Palermo","palermo":"Palermo",
  "uc sampdoria":"Sampdoria","sampdoria":"Sampdoria",
  "brescia calcio":"Brescia","brescia":"Brescia",
  "fc südtirol":"Südtirol","fc sudtirol":"Südtirol","südtirol":"Südtirol","sudtirol":"Südtirol",
  "ac pisa 1909":"Pisa","pisa 1909":"Pisa","pisa sc":"Pisa","pisa calcio":"Pisa","pisa":"Pisa",
  "uc reggiana 1919":"Reggiana","reggiana 1919":"Reggiana","reggiana":"Reggiana",
  "modena fc 2018":"Modena","modena fc":"Modena","modena":"Modena",
  "bari calcio":"Bari","ssc bari":"Bari","bari":"Bari",
  "cosenza calcio":"Cosenza","cosenza":"Cosenza",
  "spezia calcio":"Spezia","spezia":"Spezia",
  "as cittadella":"Cittadella","cittadella":"Cittadella",
  "ascoli calcio 1898 fc":"Ascoli","ascoli calcio":"Ascoli","ascoli":"Ascoli",
  "ternana calcio":"Ternana","ternana":"Ternana",
  "cesena fc":"Cesena","cesena":"Cesena",
  "ss juve stabia":"Juve Stabia","juve stabia":"Juve Stabia",
  "carrarese calcio 1908":"Carrarese","carrarese":"Carrarese",
  "mantova 1911":"Mantova","mantova":"Mantova",
  "benevento calcio":"Benevento","benevento":"Benevento",
  "calcio catania":"Catania","catania fc":"Catania","catania":"Catania",
  "pescara calcio":"Pescara","delfino pescara":"Pescara","pescara":"Pescara",
  "perugia calcio":"Perugia","perugia":"Perugia",
  "spal 2013":"SPAL","spal":"SPAL",
  "crotone calcio":"Crotone","crotone":"Crotone",
  "calcio foggia 1920":"Foggia","foggia calcio":"Foggia","foggia":"Foggia",
  "taranto fc 1927":"Taranto","taranto":"Taranto",
  "casertana fc":"Casertana","casertana":"Casertana",
  "potenza calcio":"Potenza","potenza":"Potenza",
  "audace cerignola":"Cerignola","cerignola":"Cerignola",
  "az picerno":"Picerno","picerno":"Picerno",
  "sorrento calcio":"Sorrento","sorrento":"Sorrento",
  "giugliano 1928":"Giugliano","giugliano":"Giugliano",
  "avellino 1912":"Avellino","us avellino":"Avellino","avellino":"Avellino",
  "lr vicenza":"Vicenza","vicenza":"Vicenza",
  "calcio padova":"Padova","padova":"Padova",
  "triestina calcio 1918":"Triestina","triestina":"Triestina",
  "atalanta u23":"Atalanta U23",
  "juventus next gen":"Juventus Next Gen",
  "milan futuro":"Milan Futuro"
};

function italianizzaNome(name) {
  if (!name) return name;
  return MAPPA_NOMI[name.toLowerCase().trim()] || name;
}

const COMP_CONFIG = {
  SA: {
    titolo: "Serie A", longTitle: false,
    cols: 2, perCol: 10,
    is18: false,
    zone: p => {
      if (p <= 4)  return "var(--c-zone-ucl)";
      if (p <= 6)  return "var(--c-zone-uel)";
      if (p === 7) return "var(--c-zone-uecl)";
      if (p >= 18) return "var(--c-zone-rel)";
      return "transparent";
    },
    legend: [
      { color:"var(--c-zone-ucl)",  label:"Champions League" },
      { color:"var(--c-zone-uel)",  label:"Europa League" },
      { color:"var(--c-zone-uecl)", label:"Conference League" },
      { color:"var(--c-zone-rel)",  label:"Retrocesse" },
    ]
  },
  UCL: {
    titolo: "Champions League", longTitle: true,
    cols: 2, perCol: 18,
    is18: true,
    zone: p => {
      if (p <= 8)  return "var(--c-zone-ucl)";
      if (p <= 24) return "var(--c-zone-uel)";
      return "var(--c-zone-rel)";
    },
    legend: [
      { color:"var(--c-zone-ucl)", label:"Ottavi diretti" },
      { color:"var(--c-zone-uel)", label:"Playoff" },
      { color:"var(--c-zone-rel)", label:"Eliminati" },
    ]
  },
  UEL: {
    titolo: "Europa League", longTitle: true,
    cols: 2, perCol: 18,
    is18: true,
    zone: p => {
      if (p <= 8)  return "var(--c-zone-ucl)";
      if (p <= 24) return "var(--c-zone-uel)";
      return "var(--c-zone-rel)";
    },
    legend: [
      { color:"var(--c-zone-ucl)", label:"Ottavi diretti" },
      { color:"var(--c-zone-uel)", label:"Playoff" },
      { color:"var(--c-zone-rel)", label:"Eliminati" },
    ]
  }
};

function drClass(dr) { return dr > 0 ? 'pos' : dr < 0 ? 'neg' : 'zer'; }
function drVal(dr)   { return dr > 0 ? '+'+dr : ''+dr; }

function buildRow(t, zoneColor) {
  const name = italianizzaNome(t.team);
  const isJuve = name.toLowerCase().includes('juv');
  const logo = t.logo ? `<img src="${t.logo}" alt="">` : '';
  return `<div class="row${isJuve?' juve':''}" style="--zone:${zoneColor}">
    <div class="c-pos">${t.pos}</div>
    <div class="c-logo">${logo}</div>
    <div class="c-name">${name}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drClass(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}

function buildColHead() {
  return `<div class="col-head">
    <div></div><div></div><div>Squadra</div><div>Pt</div><div>DR</div>
  </div>`;
}

(window.__CLASSIFICA__ ? Promise.resolve(window.__CLASSIFICA__) : fetch('./classifica.json').then(r=>r.json()))
  .then(data => {
    const key = (data.competition || 'SA').toUpperCase();
    const cfg = COMP_CONFIG[key] || COMP_CONFIG.SA;

    document.body.classList.add('comp-' + key);
    if (cfg.is18) document.body.classList.add('comp-18');

    // Header
    const titleEl = document.getElementById('heroTitle');
    titleEl.textContent = cfg.titolo;
    if (cfg.longTitle) titleEl.classList.add('long');
    document.getElementById('heroSub').textContent =
      `Classifica · Giornata ${data.giornata || '—'} · 2025/26`;

    // Colonne
    const area = document.getElementById('tableArea');
    let html = '';
    for (let i = 0; i < cfg.cols; i++) {
      const slice = data.classifica.slice(i * cfg.perCol, (i+1) * cfg.perCol);
      if (!slice.length) continue;
      html += `<div class="col">
        ${buildColHead()}
        <div class="col-rows">
          ${slice.map(t => buildRow(t, cfg.zone(t.pos))).join('')}
        </div>
      </div>`;
    }
    area.innerHTML = html;

    // Legenda
    document.getElementById('legend').innerHTML = cfg.legend.map(l =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${l.color}"></div>${l.label}
      </div>`
    ).join('');
  });
</script>
</body>
</html>
