<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <title>Classifica TV Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #000b3a;
      --bg-light: #001a6b;
      --accent-blue: #0084ff;
      --row-even: rgba(255, 255, 255, 0.04);
      --text-main: #ffffff;
      --text-dim: #aab4d6;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 900px;
      height: 1200px;
      overflow: hidden;
      font-family: 'Barlow', sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at 50% 40%, var(--bg-light) 0%, var(--bg-dark) 100%);
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER (Stile Sport Mediaset) ── */
    .header {
      padding: 60px 0 40px;
      text-align: center;
    }
    .header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 8rem;
      font-weight: 700;
      line-height: 0.8;
      text-transform: uppercase;
      letter-spacing: -2px;
      margin-bottom: 5px;
    }
    .header-sub {
      font-size: 1.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 8px;
      color: var(--text-dim);
    }

    /* ── TABLE ── */
    .table-area {
      flex: 1;
      display: flex;
      padding: 0 30px;
      gap: 25px;
    }

    .col { flex: 1; display: flex; flex-direction: column; }

    .col-head {
      display: grid;
      grid-template-columns: 55px 50px 1fr 60px;
      padding: 10px 15px;
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* ── ROW ── */
    .row {
      display: grid;
      grid-template-columns: 55px 50px 1fr 60px;
      align-items: center;
      height: 52px;
      padding: 0 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }
    .row:nth-child(even) { background: var(--row-even); }

    /* Badge Competizione */
    .c-badge {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .c-badge img { width: 100%; height: 100%; object-fit: contain; }

    .c-pos {
      font-weight: 900;
      font-size: 1.5rem;
      color: #fff;
    }

    .c-logo { display: flex; justify-content: center; }
    .c-logo img { width: 34px; height: 34px; }

    .c-name {
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
      padding-left: 10px;
    }

    .c-pt {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--accent-blue);
      text-align: right;
    }

    /* Colore riga speciale (Juve) */
    .row.highlight { background: rgba(255, 255, 255, 0.1) !important; }

    /* ── FOOTER LOGO ── */
    .footer-brand {
      padding: 30px;
      display: flex;
      justify-content: center;
    }
    .brand-box {
      background: #fff;
      padding: 5px 20px;
      color: #000b3a;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-style: italic;
      font-size: 1.5rem;
      border-radius: 4px;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding-bottom: 40px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .leg-box { width: 20px; height: 15px; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title" id="compTitle">SERIE A</div>
    <div class="header-sub">CLASSIFICA</div>
  </div>

  <div class="table-area" id="tableArea"></div>

  <div class="legend" id="legend"></div>

  <div class="footer-brand">
    <div class="brand-box">SPORT AI</div>
  </div>

<script>
const ASSETS = {
  UCL: "https://upload.wikimedia.org/wikipedia/commons/b/b5/UEFA_Champions_League_logo.svg",
  UEL: "https://upload.wikimedia.org/wikipedia/it/c/c5/UEFA_Europa_League_logo_2021.svg",
  UECL: "https://upload.wikimedia.org/wikipedia/it/a/ae/UEFA_Conference_League_logo.svg",
  RETRO: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'%3E%3Crect width='10' height='10' fill='%23dc2020'/%3E%3C/svg%3E"
};

const COMP_CONFIG = {
  SA: {
    title: "SERIE A",
    zones: [
      { max: 4, img: ASSETS.UCL, label: "Champions League", color: "#0084ff" },
      { max: 6, img: ASSETS.UEL, label: "Europa League", color: "#ff8000" },
      { max: 7, img: ASSETS.UECL, label: "Conference League", color: "#00d050" },
      { min: 18, img: null, label: "Retrocesse", color: "#dc2020" }
    ]
  }
};

function getZone(pos, cfg) {
  return cfg.zones.find(z => (z.max && pos <= z.max) || (z.min && pos >= z.min));
}

function buildRow(t, cfg) {
  const zone = getZone(t.pos, cfg);
  const badgeHtml = (zone && zone.img) ? `<img src="${zone.img}" alt="">` : '';
  const isJuve = t.team.toLowerCase().includes('juv');
  const ptColor = zone ? `style="color: ${zone.color}"` : '';

  return `
    <div class="row ${isJuve?'highlight':''}">
      <div class="c-badge">${badgeHtml}</div>
      <div class="c-pos">${t.pos}</div>
      <div class="c-logo"><img src="${t.logo}" alt=""></div>
      <div class="c-name">${t.team}</div>
      <div class="c-pt" ${ptColor}>${t.pt}</div>
    </div>`;
}

// Simulazione Dati
const data = {
  competition: "SA",
  classifica: [
    { pos: 1, team: "Inter", pt: 87, logo: "https://upload.wikimedia.org/wikipedia/commons/0/05/FC_Internazionale_Milano_2021.svg" },
    { pos: 2, team: "Napoli", pt: 76, logo: "https://upload.wikimedia.org/wikipedia/commons/2/2d/SSC_Napoli_2021.svg" },
    { pos: 3, team: "Roma", pt: 73, logo: "https://upload.wikimedia.org/wikipedia/it/c/cf/AS_Roma_logo_2017.svg" },
    { pos: 4, team: "Como", pt: 71, logo: "https://upload.wikimedia.org/wikipedia/it/b/be/Como_1907_logo.svg" },
    { pos: 5, team: "Milan", pt: 70, logo: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg" },
    { pos: 6, team: "Juventus", pt: 69, logo: "https://upload.wikimedia.org/wikipedia/commons/b/bc/Juventus_FC_2017_icon_%28black%29.svg" },
    { pos: 7, team: "Atalanta", pt: 59, logo: "https://upload.wikimedia.org/wikipedia/it/d/d2/Atalanta_BC.svg" },
    { pos: 8, team: "Bologna", pt: 56, logo: "https://upload.wikimedia.org/wikipedia/it/d/d8/Bologna_FC_1909_logo.svg" },
    { pos: 9, team: "Lazio", pt: 54, logo: "https://upload.wikimedia.org/wikipedia/it/c/ce/S.S._Lazio_logo.svg" },
    { pos: 10, team: "Udinese", pt: 50, logo: "https://upload.wikimedia.org/wikipedia/it/2/23/Udinese_Calcio_logo_2010.svg" },
    { pos: 11, team: "Sassuolo", pt: 49, logo: "https://upload.wikimedia.org/wikipedia/it/1/1c/US_Sassuolo_Calcio_logo.svg" },
    { pos: 12, team: "Torino", pt: 45, logo: "https://upload.wikimedia.org/wikipedia/it/2/2e/Torino_FC_logo.svg" },
    { pos: 13, team: "Parma", pt: 45, logo: "https://upload.wikimedia.org/wikipedia/it/c/c2/Parma_Calcio_1913_logo.svg" },
    { pos: 14, team: "Cagliari", pt: 43, logo: "https://upload.wikimedia.org/wikipedia/it/6/61/Cagliari_Calcio_1970_logo.svg" },
    { pos: 15, team: "Fiorentina", pt: 42, logo: "https://upload.wikimedia.org/wikipedia/it/2/2d/ACF_Fiorentina_2022_logo.svg" },
    { pos: 16, team: "Genoa", pt: 41, logo: "https://upload.wikimedia.org/wikipedia/it/6/60/Genoa_CFC_logo.svg" },
    { pos: 17, team: "Lecce", pt: 38, logo: "https://upload.wikimedia.org/wikipedia/it/a/a0/US_Lecce_logo.svg" },
    { pos: 18, team: "Cremonese", pt: 34, logo: "https://upload.wikimedia.org/wikipedia/it/2/22/US_Cremonese_logo.svg" },
    { pos: 19, team: "Verona", pt: 21, logo: "https://upload.wikimedia.org/wikipedia/it/d/d2/Hellas_Verona_FC_logo_2020.svg" },
    { pos: 20, team: "Pisa", pt: 18, logo: "https://upload.wikimedia.org/wikipedia/it/f/f6/Pisa_Sporting_Club_logo.svg" }
  ]
};

function render() {
  const cfg = COMP_CONFIG.SA;
  document.getElementById('compTitle').textContent = cfg.title;
  
  const area = document.getElementById('tableArea');
  const mid = Math.ceil(data.classifica.length / 2);
  
  const col1 = data.classifica.slice(0, mid);
  const col2 = data.classifica.slice(mid);

  const colHtml = (slice) => `
    <div class="col">
      <div class="col-head"><div></div><div>Pos.</div><div>Squadra</div><div>Pt</div></div>
      ${slice.map(t => buildRow(t, cfg)).join('')}
    </div>`;

  area.innerHTML = colHtml(col1) + colHtml(col2);

  // Legenda
  document.getElementById('legend').innerHTML = cfg.zones.map(z => `
    <div class="leg-item">
      ${z.img ? `<img src="${z.img}" width="18">` : `<div class="leg-box" style="background:${z.color}"></div>`}
      ${z.label}
    </div>`).join('');
}

render();
</script>
</body>
</html>
