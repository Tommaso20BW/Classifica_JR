<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <title>Classifica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:900px; height:1200px; overflow:hidden; }

    /* ══ VARIABILI BASE ══ */
    body {
      font-family:'Inter',sans-serif;
      color:#fff;
      display:flex;
      flex-direction:column;
    }

    /* ══ SERIE A ══ */
    body.comp-SA {
      background: radial-gradient(ellipse 80% 60% at 20% 0%, #1a3fc4 0%, transparent 60%),
                  radial-gradient(ellipse 70% 50% at 80% 100%, #0d2090 0%, transparent 60%),
                  #04093a;
      --c-header-hi: #60aaff;
      --c-pts:       #60aaff;
      --c-row-a:     rgba(255,255,255,0.10);
      --c-row-b:     rgba(255,255,255,0.03);
      --c-text-dim:  #6a80cc;
      --c-zone-1:    #1a6bdc;
      --c-zone-2:    #e87010;
      --c-zone-3:    #22a855;
      --c-zone-4:    #dc2020;
      --row-h:       93px;
      --head-h:      155px;
      --leg-h:       52px;
    }

    /* ══ UCL ══ */
    body.comp-UCL {
      background: radial-gradient(ellipse 90% 40% at 50% 0%, #0d1f4a 0%, transparent 55%),
                  #050510;
      --c-header-hi: #5ab4ff;
      --c-pts:       #ffffff;
      --c-row-a:     rgba(255,255,255,0.09);
      --c-row-b:     rgba(255,255,255,0.02);
      --c-text-dim:  #507090;
      --c-zone-1:    #1db954;
      --c-zone-2:    #f5a623;
      --c-zone-3:    #e02020;
      --row-h:       49px;
      --head-h:      140px;
      --leg-h:       52px;
    }

    /* ══ UEL ══ */
    body.comp-UEL {
      background: radial-gradient(ellipse 90% 40% at 50% 0%, #3a1000 0%, transparent 55%),
                  #080300;
      --c-header-hi: #ff7030;
      --c-pts:       #ffffff;
      --c-row-a:     rgba(255,255,255,0.09);
      --c-row-b:     rgba(255,255,255,0.02);
      --c-text-dim:  #906040;
      --c-zone-1:    #1db954;
      --c-zone-2:    #f5a623;
      --c-zone-3:    #e02020;
      --row-h:       49px;
      --head-h:      140px;
      --leg-h:       52px;
    }

    /* ── HEADER ── */
    .header {
      height:var(--head-h);
      flex-shrink:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0 40px 10px;
      gap:0;
    }
    .header-top {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:20px;
      margin-bottom:4px;
    }
    .header-comp-logo {
      width:64px;
      height:64px;
      object-fit:contain;
      flex-shrink:0;
    }
    body.comp-SA .header-comp-logo { width:70px; height:70px; }

    .header-title {
      font-family:'Anton',sans-serif;
      font-size:5.6rem;
      letter-spacing:0.06em;
      color:#fff;
      line-height:1;
      text-shadow:0 2px 30px rgba(0,0,0,0.7);
      white-space:nowrap;
    }
    body.comp-UCL .header-title,
    body.comp-UEL .header-title { font-size:4rem; }

    .header-sub {
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.1rem;
      font-weight:900;
      letter-spacing:.4em;
      text-transform:uppercase;
      color:var(--c-header-hi);
      text-align:center;
      margin-top:6px;
    }
    .header-divider {
      width:100%;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
      margin-top:10px;
    }

    /* ── TABLE AREA ── */
    .table-area {
      flex:1;
      display:flex;
      padding:8px 16px 0;
      gap:10px;
      min-height:0;
      overflow:hidden;
    }
    .col {
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    /* ── COL HEADER ── */
    .col-head {
      display:grid;
      grid-template-columns:28px 38px 1fr 44px 40px;
      align-items:center;
      padding:4px 8px 6px;
      margin-bottom:3px;
      color:var(--c-text-dim);
      font-size:.75rem;
      font-weight:800;
      letter-spacing:.2em;
      text-transform:uppercase;
      border-bottom:1px solid rgba(255,255,255,0.12);
    }
    .col-head div { text-align:center; }
    .col-head div:nth-child(3) { text-align:left; padding-left:4px; }

    .col-rows {
      flex:1;
      display:flex;
      flex-direction:column;
      gap:0;
      overflow:hidden;
    }

    /* Separatore zona */
    .zone-divider {
      height:2px;
      background:rgba(255,255,255,0.15);
      flex-shrink:0;
      margin:2px 0;
    }

    /* ── ROW ── */
    .row {
      position:relative;
      display:grid;
      grid-template-columns:28px 38px 1fr 44px 40px;
      align-items:center;
      padding:0 8px;
      flex:1;
      min-height:0;
      border-left:4px solid var(--zone,transparent);
    }
    /* Alternanza righe ben visibile */
    .row:nth-child(odd)  { background:var(--c-row-a); }
    .row:nth-child(even) { background:var(--c-row-b); }

    /* Bordo Juve oro */
    .row.juve { outline:1px solid #d4af37; outline-offset:-1px; }

    /* ── CELLE ── */
    .c-pos {
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.2rem; font-weight:700;
      color:var(--c-text-dim);
      text-align:center;
    }
    .c-logo { display:flex; align-items:center; justify-content:center; }
    .c-logo img { object-fit:contain; }
    body.comp-SA .c-logo img  { width:34px; height:34px; }
    body.comp-UCL .c-logo img,
    body.comp-UEL .c-logo img { width:26px; height:26px; }

    .c-name {
      font-weight:700;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      color:#eef2ff;
      padding-left:6px;
    }
    body.comp-SA .c-name  { font-size:1rem; }
    body.comp-UCL .c-name,
    body.comp-UEL .c-name { font-size:.83rem; }

    .c-pt {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:900;
      text-align:center;
    }
    body.comp-SA .c-pt  { font-size:1.5rem; color:var(--c-pts); }
    body.comp-UCL .c-pt,
    body.comp-UEL .c-pt { font-size:1.15rem; }

    /* Colore punti per zona UCL/UEL */
    body.comp-UCL .row[data-zone="z1"] .c-pt,
    body.comp-UEL .row[data-zone="z1"] .c-pt { color:#1db954; }
    body.comp-UCL .row[data-zone="z2"] .c-pt,
    body.comp-UEL .row[data-zone="z2"] .c-pt { color:#f5a623; }
    body.comp-UCL .row[data-zone="z3"] .c-pt,
    body.comp-UEL .row[data-zone="z3"] .c-pt { color:#e87070; }

    .c-dr {
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;
      text-align:center;
    }
    body.comp-SA .c-dr  { font-size:1.2rem; }
    body.comp-UCL .c-dr,
    body.comp-UEL .c-dr { font-size:1rem; }

    .c-dr.pos { color:#4ade80; }
    .c-dr.neg { color:#f87171; }
    .c-dr.zer { color:var(--c-text-dim); }

    /* ── LEGEND ── */
    .legend {
      height:var(--leg-h);
      flex-shrink:0;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:24px;
      padding:0 20px;
      border-top:1px solid rgba(255,255,255,0.08);
    }
    .legend-item {
      display:flex; align-items:center; gap:8px;
      font-family:'Barlow Condensed',sans-serif;
      font-size:1rem; font-weight:700;
      letter-spacing:.15em; text-transform:uppercase;
      color:rgba(255,255,255,0.5);
    }
    .legend-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <img class="header-comp-logo" id="compLogo" src="" alt="">
      <div class="header-title" id="heroTitle">Classifica</div>
    </div>
    <div class="header-sub" id="heroSub"></div>
    <div class="header-divider"></div>
  </div>

  <div class="table-area" id="tableArea"></div>
  <div class="legend" id="legend"></div>

<script>
/* ══ MAPPA NOMI ══ */
const NOMI = {

  "fc bayern münchen":"Bayern Monaco","fc bayern munich":"Bayern Monaco","bayern munich":"Bayern Monaco","bayern münchen":"Bayern Monaco",
  "atlético de madrid":"Atlético Madrid","atletico madrid":"Atlético Madrid","atleti":"Atlético Madrid",
  "aston villa fc":"Aston Villa","aston villa":"Aston Villa",
  "sl benfica":"Benfica","benfica":"Benfica",

  "as monaco":"Monaco","monaco":"Monaco",
  "sporting cp":"Sporting CP","sporting clube de portugal":"Sporting CP",
  "celtic fc":"Celtic","celtic":"Celtic",
  "club brugge kv":"Club Brugge","club brugge":"Club Brugge",
  "paris saint-germain":"Paris","paris sg":"Paris","psg":"Paris",
  "stade brestois 29":"Brest","brest":"Brest",
  "gnk dinamo":"GNK Dinamo","dinamo zagreb":"GNK Dinamo",
  "fc red bull salzburg":"Salzburg","rb salzburg":"Salzburg","salzburg":"Salzburg",
  "psv eindhoven":"PSV","psv":"PSV",

  "ac sparta prague":"Sparta Praha","sparta prague":"Sparta Praha","sparta praha":"Sparta Praha",
  "sk sturm graz":"Sturm Graz","sturm graz":"Sturm Graz",

  "ferencváros tc":"Ferencváros","ferencvaros":"Ferencváros","ferencváros":"Ferencváros",
  "sc braga":"Braga","braga":"Braga",

  "panathinaikos fc":"Panathinaikos","panathinaikos":"Panathinaikos",
  "nottingham forest":"Nott'm Forest","nottm forest":"Nott'm Forest",
  "paok fc":"PAOK Salonika","paok":"PAOK Salonika",
  "sk brann":"Brann","brann":"Brann",

  "fc basel 1893":"Basel","fc basel":"Basel","basel":"Basel",
  "pfc ludogorets razgrad":"Ludogorets Razgrad","ludogorets":"Ludogorets Razgrad",

  "ogc nice":"Nice","nice":"Nice",
  "newcastle united":"Newcastle United","newcastle":"Newcastle United",
  "galatasaray":"Galatasaray","galatasaray sk":"Galatasaray",
  "fk qarabag":"FK Qarabag","qarabag":"FK Qarabag",
  "bodo/glimt":"Bodo/Glimt","fk bodø/glimt":"Bodo/Glimt",
  "olympique de marseille":"Marseille","marseille":"Marseille",
  "pafos fc":"Pafos","pafos":"Pafos",
  "royale union saint-gilloise":"Union St.-Gilloise","union st-gilloise":"Union St.-Gilloise",
  "athletic club":"Athletic Club","athletic bilbao":"Athletic Club",
  "fc copenhagen":"F.C. København","fc københavn":"F.C. København","copenhagen":"F.C. København",
  "ajax amsterdam":"Ajax Amsterdam","ajax":"Ajax Amsterdam",
  "eintracht frankfurt":"Eintracht Frankfurt",
  "sk slavia prague":"Slavia Prague","slavia prague":"Slavia Prague",
  "villarreal cf":"Villarreal","villarreal":"Villarreal",
  "fc kairat almaty":"Kairat Almaty","kairat almaty":"Kairat Almaty",
  "olympiacos fc":"Olympiacos","olympiacos":"Olympiacos",
};

function nome(n) {
  return n ? (NOMI[n.toLowerCase().trim()] || n) : n;
}

/* ══ CONFIG COMPETIZIONI ══ */
const CFG = {
  SA: {
    titolo:"Serie A",
    logo:"https://upload.wikimedia.org/wikipedia/it/thumb/e/ef/Serie_A_Enilive_25-26.svg/500px-Serie_A_Enilive_25-26.svg.png",
    subLabel: g => `Classifica · Giornata ${g} · 2026/27`,
    cols:2, perCol:10,
    zone: p => {
      if(p<=4)  return {color:"var(--c-zone-1)",key:"z1"};
      if(p<=6)  return {color:"var(--c-zone-2)",key:"z2"};
      if(p===7) return {color:"var(--c-zone-3)",key:"z3"};
      if(p>=18) return {color:"var(--c-zone-4)",key:"z4"};
      return {color:"transparent",key:""};
    },
    sepAfter:[4,6,7,17],
    legend:[
      {color:"var(--c-zone-1)",label:"Champions League"},
      {color:"var(--c-zone-2)",label:"Europa League"},
      {color:"var(--c-zone-3)",label:"Conference League"},
      {color:"var(--c-zone-4)",label:"Retrocesse"},
    ]
  },
  UCL: {
    titolo:"Champions League",
    logo:"https://mir-s3-cdn-cf.behance.net/project_modules/max_632/d6297891682131.5e3864b00f466.png",
    subLabel: g => `After MD ${g} · 2026/27`,
    cols:2, perCol:18,
    zone: p => {
      if(p<=8)  return {color:"var(--c-zone-1)",key:"z1"};
      if(p<=24) return {color:"var(--c-zone-2)",key:"z2"};
      return {color:"var(--c-zone-3)",key:"z3"};
    },
    sepAfter:[8,24],
    legend:[
      {color:"#1db954",label:"R16 Diretti"},
      {color:"#f5a623",label:"Playoff"},
      {color:"#e02020",label:"Eliminati"},
    ]
  },
  UEL: {
    titolo:"Europa League",
    logo:"https://r2.thesportsdb.com/images/media/league/badge/mlsr7d1718774547.png/medium",
    subLabel: g => `After MD ${g} · 2026/27`,
    cols:2, perCol:18,
    zone: p => {
      if(p<=8)  return {color:"var(--c-zone-1)",key:"z1"};
      if(p<=24) return {color:"var(--c-zone-2)",key:"z2"};
      return {color:"var(--c-zone-3)",key:"z3"};
    },
    sepAfter:[8,24],
    legend:[
      {color:"#1db954",label:"R16 Diretti"},
      {color:"#f5a623",label:"Playoff"},
      {color:"#e02020",label:"Eliminati"},
    ]
  }
};

function drCls(v){ return v>0?'pos':v<0?'neg':'zer'; }
function drVal(v){ return v>0?'+'+v:''+v; }

function buildRow(t, zInfo) {
  const n = nome(t.team);
  const isJ = n.toLowerCase().includes('juv');
  const logo = t.logo ? `<img src="${t.logo}" alt="">` : '';
  return `<div class="row${isJ?' juve':''}" style="--zone:${zInfo.color}" data-zone="${zInfo.key}">
    <div class="c-pos">${t.pos}</div>
    <div class="c-logo">${logo}</div>
    <div class="c-name">${n}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drCls(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}

function buildHead() {
  return `<div class="col-head">
    <div></div><div></div><div>Squadra</div><div>PT</div><div>GD</div>
  </div>`;
}

(window.__CLASSIFICA__ ? Promise.resolve(window.__CLASSIFICA__) : fetch('./classifica.json').then(r=>r.json()))
  .then(data => {
    const key = (data.competition||'SA').toUpperCase();
    const cfg = CFG[key] || CFG.SA;

    document.body.classList.add('comp-'+key);

    /* Logo competizione */
    document.getElementById('compLogo').src = cfg.logo;

    /* Titolo e sottotitolo */
    document.getElementById('heroTitle').textContent = cfg.titolo;
    document.getElementById('heroSub').textContent = cfg.subLabel(data.giornata || '—');

    /* Tabella */
    const area = document.getElementById('tableArea');
    let html = '';
    for(let i=0; i<cfg.cols; i++){
      const slice = data.classifica.slice(i*cfg.perCol,(i+1)*cfg.perCol);
      if(!slice.length) continue;
      let rows='';
      slice.forEach((t,idx)=>{
        const posG = i*cfg.perCol + idx + 1;
        const zi = cfg.zone(posG);
        rows += buildRow(t, zi);
        if(cfg.sepAfter && cfg.sepAfter.includes(posG)){
          rows += `<div class="zone-divider"></div>`;
        }
      });
      html += `<div class="col">${buildHead()}<div class="col-rows">${rows}</div></div>`;
    }
    area.innerHTML = html;

    /* Legenda */
    document.getElementById('legend').innerHTML = cfg.legend.map(l=>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${l.color}"></div>${l.label}
      </div>`
    ).join('');
  });
</script>
</body>
</html>
