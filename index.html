<html lang="it">

  <meta charset="UTF-8"/>
  <title>Classifica</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:  900px;
      height: 1200px;
      overflow: hidden;
    }

    /* ══ VARIABILI BASE (Serie A) ══ */
    body {
      --c-bg:        #07123a;
      --c-header-hi: #5ab4ff;
      --c-row-odd:   rgba(255,255,255,0.055);
      --c-row-even:  rgba(255,255,255,0.00);
      --c-row-border:rgba(255,255,255,0.09);
      --c-text:      #ffffff;
      --c-text-dim:  #6a82cc;
      --c-pts:       #5aabff;
      --c-zone-ucl:  #1a6bdc;
      --c-zone-uel:  #e87010;
      --c-zone-uecl: #22a855;
      --c-zone-rel:  #dc2020;
      --c-juve:      #d4af37;
      --c-divider:   rgba(255,255,255,0.13);
      --head-h: 160px;
      --leg-h:  52px;
    }

    body.comp-UCL {
      --c-bg:        #090520;
      --c-header-hi: #b070ff;
      --c-row-border:rgba(140,70,255,0.18);
      --c-text-dim:  #8060b0;
      --c-pts:       #b070ff;
      --c-zone-ucl:  #6030d0;
      --c-zone-uel:  #c030d0;
      --c-zone-uecl: #94a3b8;
      --c-zone-rel:  #dc2020;
      --c-divider:   rgba(140,70,255,0.22);
      --head-h: 145px;
    }

    body.comp-UEL {
      --c-bg:        #110400;
      --c-header-hi: #ff6830;
      --c-row-border:rgba(200,60,10,0.20);
      --c-text-dim:  #a04828;
      --c-pts:       #ff6830;
      --c-zone-ucl:  #c03808;
      --c-zone-uel:  #d08010;
      --c-zone-uecl: #94a3b8;
      --c-zone-rel:  #dc2020;
      --c-divider:   rgba(200,80,20,0.25);
      --head-h: 145px;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--c-text);
      background-color: var(--c-bg);
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      height: var(--head-h);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px 14px;
    }
    .header-title {
      font-family: 'Anton', sans-serif;
      font-size: 6rem;
      letter-spacing: 0.08em;
      color: #fff;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }
    .header-title.long { font-size: 4.2rem; }
    .header-sub {
      font-family: 'Anton', sans-serif;
      font-size: 1.05rem;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--c-header-hi);
      margin-top: 5px;
      text-align: center;
    }
    .header-divider {
      width: 100%;
      height: 1px;
      background: var(--c-divider);
      margin-top: 13px;
    }

    /* ── TABLE AREA ── */
    .table-area {
      flex: 1;
      display: flex;
      padding: 10px 18px 0;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    /* ── COLUMN ── */
    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── COL HEADER ── */
    .col-head {
      display: grid;
      grid-template-columns: 30px 40px 1fr 44px 40px;
      align-items: center;
      padding: 4px 8px 6px;
      margin-bottom: 4px;
      color: var(--c-text-dim);
      font-family: 'Anton', sans-serif;
      font-size: .78rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--c-divider);
    }
    .col-head div { text-align: center; }
    .col-head div:nth-child(3) { text-align: left; padding-left: 4px; }

    /* ── COL-ROWS ── */
    .col-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    /* ── ROW ── */
    .row {
      position: relative;
      display: grid;
      grid-template-columns: 30px 40px 1fr 44px 40px;
      align-items: center;
      border-radius: 6px;
      padding: 0 8px;
      border: 1px solid var(--c-row-border);
      flex: 1;
      min-height: 0;
    }
    .row:nth-child(odd)  { background: var(--c-row-odd); }
    .row:nth-child(even) { background: var(--c-row-even); }

    .row::before {
      content: "";
      position: absolute;
      left: 0; top: 12%; height: 76%;
      width: 4px;
      border-radius: 0 3px 3px 0;
      background: var(--zone, transparent);
    }

    /* ── CELLE ── */
    .c-pos {
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      color: var(--c-text-dim);
      text-align: center;
    }
    .c-logo {
      display: flex; align-items: center; justify-content: center;
    }
    .c-logo img { width: 34px; height: 34px; object-fit: contain; }
    .c-name {
      font-size: 1rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #eef2ff;
      padding-left: 6px;
    }
    .c-pt {
      font-family: 'Anton', sans-serif;
      font-size: 1.45rem;
      color: var(--c-pts);
      text-align: center;
    }
    .c-dr {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      text-align: center;
    }
    .c-dr.pos { color: #4ade80; }
    .c-dr.neg { color: #f87171; }
    .c-dr.zer { color: var(--c-text-dim); }

    .row.juve { border-color: var(--c-juve) !important; }

    /* comp-18: 2 colonne da 18 squadre — righe più compatte */
    body.comp-18 .c-logo img { width: 26px; height: 26px; }
    body.comp-18 .c-name  { font-size: .82rem; }
    body.comp-18 .c-pt    { font-size: 1.2rem; }
    body.comp-18 .c-dr    { font-size: 1rem; }
    body.comp-18 .c-pos   { font-size: 1.05rem; }
    body.comp-18 .col-head { font-size: .7rem; }

    /* ── LEGEND ── */
    .legend {
      height: var(--leg-h);
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      border-top: 1px solid var(--c-divider);
      margin-top: 8px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Anton', sans-serif;
      font-size: .88rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--c-text-dim);
    }
    .legend-dot {
      width: 13px; height: 13px; border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>

function italianizzaNome(name) {
  if (!name) return name;
  return MAPPA_NOMI[name.toLowerCase().trim()] || name;

function getLogo(team, fallbackUrl) {
  // cerca per nome italianizzato e nome originale
  return LOGO_OVERRIDE[team] || LOGO_OVERRIDE[italianizzaNome(team)] || fallbackUrl || "";
}

  const logoUrl = getLogo(t.team, t.logo);
  const logo = logoUrl ? `<img src="${logoUrl}" alt="">` : '';
  return `<div class="row${isJuve?' juve':''}" style="--zone:${zoneColor}">
    <div class="c-pos">${t.pos}</div>
    <div class="c-logo">${logo}</div>
    <div class="c-name">${name}</div>
    <div class="c-pt">${t.pt}</div>
    <div class="c-dr ${drClass(t.dr)}">${drVal(t.dr)}</div>
  </div>`;
}

function buildColHead() {
  return `<div class="col-head">
    <div></div><div></div><div>Squadra</div><div>Pt</div><div>DR</div>
  </div>`;
}

(window.__CLASSIFICA__ ? Promise.resolve(window.__CLASSIFICA__) : fetch('./classifica.json').then(r=>r.json()))
  .then(data => {
    const key = (data.competition || 'SA').toUpperCase();
    const cfg = COMP_CONFIG[key] || COMP_CONFIG.SA;

    document.body.classList.add('comp-' + key);
    if (cfg.is18) document.body.classList.add('comp-18');

    const titleEl = document.getElementById('heroTitle');
    titleEl.textContent = cfg.titolo;
    if (cfg.longTitle) titleEl.classList.add('long');
    document.getElementById('heroSub').textContent =
      `Classifica · Giornata ${data.giornata || '—'} · 2025/26`;

    const area = document.getElementById('tableArea');
    let html = '';
    for (let i = 0; i < cfg.cols; i++) {
      const slice = data.classifica.slice(i * cfg.perCol, (i+1) * cfg.perCol);
      if (!slice.length) continue;
      html += `<div class="col">
        ${buildColHead()}
        <div class="col-rows">
          ${slice.map(t => buildRow(t, cfg.zone(t.pos))).join('')}
        </div>
      </div>`;
    }
    area.innerHTML = html;

    document.getElementById('legend').innerHTML = cfg.legend.map(l =>
      `<div class="legend-item">
        <div class="legend-dot" style="background:${l.color}"></div>${l.label}
      </div>`
    ).join('');
  });
</script>
</body>
</html>
